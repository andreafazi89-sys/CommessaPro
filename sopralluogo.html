<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CommessaPro">
<meta name="theme-color" content="#0F0D0A">
<link rel="icon" href="logo-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Sopralluogo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Epilogue:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#0F0D0A;--surface:#1A1714;--surface2:#242018;--brick:#D4511E;--brick-dim:rgba(212,81,30,0.15);--sand:#C8B89A;--sand-dim:rgba(200,184,154,0.12);--white:#F5F0E8;--muted:#6B6258;--border:rgba(200,184,154,0.12);--green:#4A8C5C;--green-dim:rgba(74,140,92,0.15);--r:14px;--r-sm:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Epilogue',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}
.view{display:none;}.view.active{display:block;}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.save-ind{font-size:11px;color:var(--muted);}.save-ind.ok{color:var(--green);}
.btn-top{background:var(--sand-dim);color:var(--sand);border:none;border-radius:8px;padding:7px 12px;font-family:Epilogue,sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.btn-back{color:var(--muted);background:none;border:none;cursor:pointer;font-size:22px;padding:0;}
.prog{display:flex;gap:6px;padding:8px 16px 0;}
.ps{height:3px;flex:1;background:var(--border);border-radius:2px;transition:background .3s;}.ps.done{background:var(--brick);}
.content{padding:16px 16px 150px;}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;}
.sec-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sand);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-icon{width:28px;height:28px;background:var(--brick-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.fg{margin-bottom:12px;}.fg:last-child{margin-bottom:0;}
label{display:block;font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
input,textarea,select{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--white);font-family:'Epilogue',sans-serif;font-size:16px;outline:none;transition:border-color .15s;-webkit-appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--brick);}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:#1A1714;color:var(--white);}
textarea{resize:none;min-height:90px;line-height:1.6;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ambiente-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.ambiente-row input{flex:1;}
.ambiente-row .mq-inp{width:75px;flex:none;text-align:center;}
.ambiente-row .del-btn{background:var(--brick-dim);color:var(--brick);border:none;border-radius:8px;width:36px;height:48px;font-size:15px;cursor:pointer;flex-shrink:0;}
.voice-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;}
.voice-play{width:40px;height:40px;background:var(--brick);color:#fff;border:none;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.voice-play.playing{background:var(--green);}
.voice-info{flex:1;}.voice-dur{font-size:12px;color:var(--muted);}.voice-lbl{font-size:13px;font-weight:500;}
.voice-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;}
.rec-btn{width:100%;padding:14px;border:none;border-radius:var(--r-sm);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.rec-btn.idle{background:var(--surface2);color:var(--sand);border:1px solid var(--border);}
.rec-btn.recording{background:#C84040;color:#fff;animation:pulse-rec 1s infinite;}
@keyframes pulse-rec{0%,100%{opacity:1}50%{opacity:.7}}
.foto-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.foto-btn{padding:14px;background:var(--surface2);border:1.5px dashed var(--border);border-radius:var(--r-sm);text-align:center;cursor:pointer;}
.foto-btn:active{border-color:var(--brick);}
.foto-btn-icon{font-size:22px;margin-bottom:4px;}.foto-btn-lbl{font-size:12px;font-weight:500;color:var(--sand);}
input[type="file"]{display:none;}
.foto-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.foto-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--surface2);}
.foto-item img{width:100%;height:100%;object-fit:cover;display:block;}
.foto-del{position:absolute;top:3px;right:3px;width:22px;height:22px;background:rgba(0,0,0,.75);color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.foto-num{position:absolute;bottom:3px;left:5px;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 60%,transparent);z-index:100;display:flex;flex-direction:column;gap:8px;}
.btn-main{width:100%;padding:16px;background:var(--brick);color:#fff;border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none;}
.btn-main:active{transform:scale(.98);background:#B53D10;}
.btn-main.green{background:var(--green);}.btn-main.green:active{background:#357A42;}
.btn-row{display:flex;gap:8px;}
.btn-sec{flex:1;padding:13px 10px;background:var(--surface2);color:var(--sand);border:1px solid var(--border);border-radius:var(--r);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;-webkit-appearance:none;}
.report-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:#fff;display:none;flex-direction:column;}
.report-overlay.show{display:flex;}
.report-topbar{background:#1A1612;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rep-title{font-family:'Syne',sans-serif;font-size:15px;color:#fff;font-weight:700;}
.rep-actions{display:flex;gap:8px;}
.rep-btn{padding:8px 14px;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.rep-btn.close{background:rgba(255,255,255,.1);color:#fff;}
.rep-btn.print{background:var(--brick);color:#fff;}
.report-frame{flex:1;border:none;width:100%;}
.toast{position:fixed;top:70px;left:16px;right:16px;padding:14px 16px;border-radius:var(--r-sm);font-size:14px;font-weight:500;text-align:center;z-index:9999;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{background:var(--green);color:#fff;}
.toast.err{background:#C8441A;color:#fff;}
.toast.inf{background:var(--surface2);color:var(--white);border:1px solid var(--border);}
.sop-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;}
.sop-card:active{border-color:var(--brick);}
.sop-icon{width:44px;height:44px;background:var(--brick-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.sop-info{flex:1;min-width:0;}
.sop-nome{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sop-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.sop-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-txt{font-size:15px;font-weight:500;color:var(--sand);margin-bottom:6px;}
.empty-sub{font-size:13px;}
.divider{height:1px;background:var(--border);margin:14px 0;}
</style>
</head>
<body>

<div id="view-lista" class="view active">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <a href="index.html" style="color:var(--muted);text-decoration:none;font-size:22px">←</a>
      <div class="topbar-title">📋 Sopralluoghi</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-top" onclick="forcSync()" title="Sincronizza">🔄</button>
      <button class="btn-top" onclick="document.getElementById('import-input').click()">📥</button>
      <button class="btn-top" onclick="esportaDati()">📤</button>
      <button class="btn-top" onclick="nuovoSopralluogo()">+ Nuovo</button>
    </div>
  </div>
  <div class="content" style="padding-bottom:40px"><div id="lista-container"></div></div>
</div>

<div id="view-form" class="view">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-back" onclick="tornaLista()">←</button>
      <div class="topbar-title" id="form-title">Nuovo Sopralluogo</div>
    </div>
    <span class="save-ind" id="si">● bozza</span>
  </div>
  <div class="prog">
    <div class="ps" id="p0"></div><div class="ps" id="p1"></div>
    <div class="ps" id="p2"></div><div class="ps" id="p3"></div>
  </div>
  <div class="content">

    <div class="section">
      <div class="sec-title"><div class="sec-icon">👷</div>Responsabile</div>
      <div class="row2">
        <div class="fg"><label>Responsabile</label>
          <select id="f-resp" onchange="salva()">
            <option>Andrea Fazi</option><option>Lino Brunozzi</option><option>Rino Lenti</option>
          </select>
        </div>
        <div class="fg"><label>Data sopralluogo</label><input type="date" id="f-data" oninput="salva()"></div>
      </div>
      <div class="fg"><label>Titolo / Descrizione lavoro *</label><input type="text" id="f-titolo" placeholder="Es. Ristrutturazione bagno, Infiltrazione 3° piano..." oninput="salva()"></div>
    </div>

    <div class="section">
      <div class="sec-title">
        <div class="sec-icon">👤</div>Cliente
        <button onclick="apriRubrica()" style="margin-left:auto;background:var(--brick-dim);color:var(--brick);border:none;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:Epilogue,sans-serif">👥 Rubrica</button>
      </div>
      <div class="fg"><label>Nome e Cognome *</label><input type="text" id="fc" placeholder="Es. Marco Rossi" oninput="salva()"></div>
      <div class="row2">
        <div class="fg"><label>Telefono</label><input type="tel" id="ft" placeholder="333 000 0000" oninput="salva()"></div>
        <div class="fg"><label>Email</label><input type="email" id="fe" placeholder="email@..." oninput="salva()"></div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-icon">📍</div>Cantiere</div>
      <div class="fg"><label>Indirizzo *</label><input type="text" id="fi" placeholder="Via, numero, città" oninput="salva()"></div>
      <div class="row2">
        <div class="fg"><label>Piano</label><input type="text" id="fp" placeholder="Es. 2° piano" oninput="salva()"></div>
        <div class="fg"><label>Sup. totale (mq)</label><input type="number" id="fm" placeholder="Es. 75" oninput="salva()"></div>
      </div>
      <div class="fg"><label>Accesso</label>
        <select id="facc" onchange="salva()">
          <option>Facile — ascensore / piano terra</option>
          <option>Normale — scale</option>
          <option>Difficile — scala stretta / mansarda</option>
        </select>
      </div>
      <div class="divider"></div>
      <label style="margin-bottom:8px;display:block">Misure per ambiente</label>
      <div id="ambienti-list"></div>
      <button onclick="aggiungiAmbiente()" style="width:100%;padding:11px;background:var(--surface2);border:1.5px dashed var(--border);border-radius:var(--r-sm);color:var(--muted);font-family:Epilogue,sans-serif;font-size:13px;cursor:pointer;margin-top:4px">+ Aggiungi ambiente</button>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-icon">🔨</div>Lavorazioni richieste</div>
      <div class="fg"><textarea id="fl" placeholder="Descrivi le lavorazioni richieste dal cliente..." oninput="salva()"></textarea></div>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-icon">🎙️</div>Note vocali
        <span id="rec-timer" style="margin-left:auto;font-size:12px;color:#C84040;font-family:Epilogue,sans-serif;text-transform:none;letter-spacing:0;font-weight:400;display:none">⏺ 0:00</span>
      </div>
      <div id="voice-list" style="margin-bottom:10px"></div>
      <button class="rec-btn idle" id="rec-btn" onclick="toggleRec()">
        <span id="rec-icon">🎙️</span><span id="rec-label">Inizia registrazione</span>
      </button>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-icon">📝</div>Note aggiuntive</div>
      <div class="fg"><textarea id="fn" placeholder="Osservazioni, preferenze cliente, materiali richiesti..." oninput="salva()"></textarea></div>
    </div>

    <div class="section">
      <div class="sec-title">
        <div class="sec-icon">📷</div>Foto
        <span id="fnum" style="margin-left:auto;font-size:12px;color:var(--muted);font-family:Epilogue,sans-serif;text-transform:none;letter-spacing:0;font-weight:400">0 foto</span>
      </div>
      <div class="foto-btns">
        <div class="foto-btn" onclick="document.getElementById('fi-cam').click()">
          <div class="foto-btn-icon">📷</div><div class="foto-btn-lbl">Scatta foto</div>
        </div>
        <div class="foto-btn" onclick="document.getElementById('fi-lib').click()">
          <div class="foto-btn-icon">🖼️</div><div class="foto-btn-lbl">Dalla libreria</div>
        </div>
      </div>
      <input type="file" id="fi-cam" accept="image/*" capture="environment" multiple onchange="caricaFoto(this)">
      <input type="file" id="fi-lib" accept="image/*" multiple onchange="caricaFoto(this)">
      <div class="foto-grid" id="foto-grid"></div>
    </div>

  </div>
  <div class="bottom-bar">
    <div class="btn-row">
      <button class="btn-sec" onclick="copiaTesto()">📋 Copia</button>
      <button class="btn-sec" onclick="generaReport()" style="flex:2">📄 Genera Report</button>
    </div>
    <button class="btn-main green" id="btn-avvia" onclick="avviaCantiere()">🏗️ Avvia Cantiere</button>
  </div>
</div>

<div class="report-overlay" id="report-overlay">
  <div class="report-topbar">
    <div class="rep-title">📄 Report Sopralluogo</div>
    <div class="rep-actions">
      <button class="rep-btn close" onclick="chiudiReport()">✕ Chiudi</button>
      <button class="rep-btn print" onclick="document.getElementById('report-frame').contentWindow.print()">🖨️ PDF</button>
    </div>
  </div>
  <iframe id="report-frame" class="report-frame"></iframe>
</div>

<input type="file" id="import-input" accept=".json" style="display:none" onchange="leggiImport(this)">
<div class="toast" id="toast"></div>

<script>
// ── SUPABASE ──
const SUPA_URL = 'https://iradzlocobsipjazracw.supabase.co';
const SUPA_KEY = 'sb_publishable_zFgRrNrmYSORug8N06heow_6vjl0fhH';
const LIST_KEY = 'sopralluoghi_v3';
let db = null;

function initDB(){
  if(window.supabase) db = window.supabase.createClient(SUPA_URL, SUPA_KEY);
}
async function dbSalva(chiave, valore){
  if(!db) return;
  try{ await db.from('dati').upsert({chiave, valore, ts:new Date().toISOString()},{onConflict:'chiave'}); }
  catch(e){ console.warn('sync err',e); }
}
async function dbCarica(chiave){
  if(!db) return null;
  try{
    const {data} = await db.from('dati').select('valore').eq('chiave',chiave).maybeSingle();
    return data ? data.valore : null;
  }catch(e){ return null; }
}
async function forcSync(){
  toast('🔄 Sincronizzazione...','inf');
  const remoto = await dbCarica(LIST_KEY);
  if(remoto && Array.isArray(remoto) && remoto.length > 0){
    const locale = getLista();
    const remIds = new Set(remoto.map(x=>x.id));
    const extra = locale.filter(x=>!remIds.has(x.id));
    salveLista([...remoto,...extra]);
    renderLista();
  }
  toast('✓ Sincronizzato','ok');
}

// ── STATE ──
let foto = [], ambienti = [], noteVocali = [];
let currentId = null, saveTimer = null;
let mediaRecorder = null, audioChunks = [], recInterval = null;
let recSeconds = 0, isRecording = false, currentAudio = null;

const g = id => document.getElementById(id);
const gv = id => g(id)?.value?.trim() || '';
const sv = (id,val) => { const el=g(id); if(el&&val!=null) el.value=val; };

function toast(msg,tipo){
  const t=g('toast'); t.textContent=msg; t.className='toast '+tipo+' show';
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3500);
}
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  g('view-'+name).classList.add('active'); window.scrollTo(0,0);
}

// ── LISTA ──
function getLista(){ try{return JSON.parse(localStorage.getItem(LIST_KEY))||[];}catch{return[];} }
function salveLista(l){ localStorage.setItem(LIST_KEY,JSON.stringify(l)); dbSalva(LIST_KEY,l); }

function renderLista(){
  const lista=getLista();
  const el=g('lista-container');
  if(!lista.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-txt">Nessun sopralluogo</div><div class="empty-sub">Premi "+ Nuovo" per iniziare</div></div>`;
    return;
  }
  el.innerHTML=lista.map(s=>`
    <div class="sop-card" onclick="apriSopralluogo('${s.id}')">
      <div class="sop-icon">${s.cantiereId?'🏗️':'📋'}</div>
      <div class="sop-info">
        <div class="sop-nome">${s.titolo||s.cliente||'Sopralluogo senza titolo'}</div>
        <div class="sop-meta">${s.cliente||'—'} · ${s.data||'—'}${s.cantiereId?' · <span style="color:var(--green)">Cantiere attivo</span>':''}</div>
      </div>
      <button class="sop-del" onclick="event.stopPropagation();eliminaSopralluogo('${s.id}')">🗑</button>
    </div>`).join('');
}

function eliminaSopralluogo(id){
  if(!confirm('Eliminare questo sopralluogo?')) return;
  salveLista(getLista().filter(s=>s.id!==id));
  renderLista(); toast('Eliminato','inf');
}

// ── NUOVO / APRI ──
function nuovoSopralluogo(){
  currentId='sop_'+Date.now(); foto=[]; ambienti=[]; noteVocali=[];
  resetForm(); g('f-data').value=new Date().toISOString().split('T')[0];
  g('form-title').textContent='Nuovo Sopralluogo';
  g('si').textContent='● nuovo'; g('si').className='save-ind';
  renderFoto(); renderAmbienti(); renderNoteVocali();
  aggiornaBottoneAvvia(null); aggiornaProg(); showView('form');
}

function apriSopralluogo(id){
  const s=getLista().find(x=>x.id===id); if(!s) return;
  currentId=id; foto=s.foto||[]; ambienti=s.ambienti||[];
  noteVocali=(s.noteVocali||[]).map(n=>({dur:n.dur,b64:n.b64,type:n.type||'audio/webm',url:null}));
  resetForm();
  sv('f-resp',s.resp); sv('f-data',s.data); sv('f-titolo',s.titolo); sv('fc',s.cliente); sv('ft',s.tel);
  sv('fe',s.email); sv('fi',s.indirizzo); sv('fp',s.piano); sv('fm',s.mq);
  sv('facc',s.accesso); sv('fl',s.lavori); sv('fn',s.note);
  g('form-title').textContent=s.titolo||s.cliente||'Sopralluogo';
  g('si').textContent='✓ salvato'; g('si').className='save-ind ok';
  renderFoto(); renderAmbienti(); renderNoteVocali();
  aggiornaBottoneAvvia(s.cantiereId); aggiornaProg(); showView('form');
}

function resetForm(){
  ['f-titolo','fc','ft','fe','fi','fp','fm','fl','fn'].forEach(id=>{const el=g(id);if(el)el.value='';});
  sv('f-resp','Andrea Fazi'); g('facc').selectedIndex=0;
}

function tornaLista(){
  if(isRecording) fermaReg();
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  showView('lista'); renderLista();
}

// ── AUTOSAVE ──
function salva(){
  aggiornaProg(); clearTimeout(saveTimer);
  g('si').textContent='● salvando...'; g('si').className='save-ind';
  saveTimer=setTimeout(()=>{
    const lista=getLista(); const idx=lista.findIndex(s=>s.id===currentId);
    const dati={id:currentId,resp:gv('f-resp'),data:gv('f-data'),titolo:gv('f-titolo'),cliente:gv('fc'),tel:gv('ft'),email:gv('fe'),
      indirizzo:gv('fi'),piano:gv('fp'),mq:gv('fm'),accesso:gv('facc'),lavori:gv('fl'),note:gv('fn'),
      ambienti,foto,noteVocali:noteVocali.map(n=>({dur:n.dur,b64:n.b64,type:n.type})),
      cantiereId:(idx>=0?lista[idx].cantiereId:null)||null};
    if(idx>=0) lista[idx]=dati; else lista.unshift(dati);
    try{
      salveLista(lista);
      g('si').textContent='✓ salvato'; g('si').className='save-ind ok';
      // Aggiorna il cantiere collegato se esiste
      if(dati.cantiereId) aggiornaCantiere(dati);
    }
    catch(e){ g('si').textContent='● bozza'; toast('Spazio pieno','err'); }
  },800);
}

function aggiornaCantiere(sop){
  const cantieri = getCantieri();
  const idx = cantieri.findIndex(c=>c.id===sop.cantiereId);
  if(idx<0) return;
  // Aggiorna solo i campi informativi, non le giornate o i costi
  cantieri[idx].cliente = sop.cliente;
  cantieri[idx].indirizzo = sop.indirizzo;
  cantieri[idx].resp = sop.resp;
  cantieri[idx].mq = sop.mq;
  cantieri[idx].titolo = sop.titolo;
  localStorage.setItem('cantieri_v1', JSON.stringify(cantieri));
  dbSalva('cantieri_v1', cantieri);
}

function aggiornaProg(){
  [[gv('f-titolo'),'p0'],[gv('fi'),'p1'],[gv('fl'),'p2'],[foto.length?'x':'','p3']].forEach(([v,id])=>{
    g(id)?.classList.toggle('done',!!v);
  });
}

// ── NOTE VOCALI ──
async function toggleRec(){
  if(isRecording){fermaReg();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[]; recSeconds=0;
    let mimeType='audio/webm';
    if(MediaRecorder.isTypeSupported('audio/mp4')) mimeType='audio/mp4';
    mediaRecorder=new MediaRecorder(stream,{mimeType});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(audioChunks,{type:mimeType});
      const reader=new FileReader();
      reader.onload=ev=>{
        noteVocali.push({dur:recSeconds,b64:ev.target.result,type:mimeType,url:null});
        renderNoteVocali(); salva();
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start(100); isRecording=true;
    g('rec-btn').className='rec-btn recording';
    g('rec-icon').textContent='⏹'; g('rec-label').textContent='Tocca per fermare';
    g('rec-timer').style.display='block';
    recInterval=setInterval(()=>{
      recSeconds++;
      const m=Math.floor(recSeconds/60),s=recSeconds%60;
      g('rec-timer').textContent=`⏺ ${m}:${s.toString().padStart(2,'0')}`;
    },1000);
  }catch(e){toast('Microfono non disponibile','err');}
}

function fermaReg(){
  if(!isRecording) return;
  isRecording=false; clearInterval(recInterval); mediaRecorder?.stop();
  g('rec-btn').className='rec-btn idle';
  g('rec-icon').textContent='🎙️'; g('rec-label').textContent='Inizia registrazione';
  g('rec-timer').style.display='none';
}

function renderNoteVocali(){
  const el=g('voice-list'); if(!noteVocali.length){el.innerHTML='';return;}
  const m_=n=>Math.floor(n.dur/60), s_=n=>(n.dur%60).toString().padStart(2,'0');
  el.innerHTML=noteVocali.map((n,i)=>`
    <div class="voice-item">
      <button class="voice-play" id="vp-${i}" onclick="playVoce(${i})">▶</button>
      <div class="voice-info"><div class="voice-lbl">Nota vocale ${i+1}</div><div class="voice-dur">${m_(n)}:${s_(n)}</div></div>
      <button class="voice-del" onclick="delVoce(${i})">🗑</button>
    </div>`).join('');
}

function playVoce(i){
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  document.querySelectorAll('.voice-play').forEach(b=>{b.textContent='▶';b.classList.remove('playing');});
  const n=noteVocali[i];
  const audio=new Audio(n.b64);
  currentAudio=audio;
  const btn=g('vp-'+i); btn.textContent='⏸'; btn.classList.add('playing');
  audio.play().catch(()=>toast('Impossibile riprodurre','err'));
  audio.onended=()=>{btn.textContent='▶';btn.classList.remove('playing');currentAudio=null;};
}
function delVoce(i){noteVocali.splice(i,1);renderNoteVocali();salva();}

// ── FOTO ──
function caricaFoto(input){
  [...input.files].forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=600; let w=img.width,h=img.height;
        if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        foto.push({url:canvas.toDataURL('image/jpeg',0.65)});
        renderFoto(); salva();
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function renderFoto(){
  g('fnum').textContent=foto.length+' foto';
  const grid=g('foto-grid');
  if(!foto.length){grid.innerHTML='';aggiornaProg();return;}
  grid.innerHTML=foto.map((f,i)=>`
    <div class="foto-item"><img src="${f.url}">
      <button class="foto-del" onclick="delFoto(${i})">✕</button>
      <span class="foto-num">${i+1}</span>
    </div>`).join('');
  aggiornaProg();
}
function delFoto(i){foto.splice(i,1);renderFoto();}

// ── AVVIA CANTIERE ──
function aggiornaBottoneAvvia(cantiereId){
  const btn=g('btn-avvia');
  if(cantiereId){btn.textContent='🏗️ Vai al Cantiere';btn.onclick=()=>{window.location.href='cantiere.html?id='+cantiereId;};}
  else{btn.textContent='🏗️ Avvia Cantiere';btn.onclick=avviaCantiere;}
}

function avviaCantiere(){
  if(!gv('fc')||!gv('fi')){toast('Inserisci cliente e indirizzo prima','err');return;}
  if(!confirm(`Avviare il cantiere per ${gv('fc')}?`)) return;
  const cantiereId='cant_'+Date.now();
  const cantieri=getCantieri();
  cantieri.unshift({id:cantiereId,sopralluogoId:currentId,cliente:gv('fc'),indirizzo:gv('fi'),
    resp:gv('f-resp'),mq:gv('fm'),dataInizio:new Date().toISOString().split('T')[0],
    stato:'In corso',giornate:[],costiMateriali:[],preventivo:0});
  localStorage.setItem('cantieri_v1',JSON.stringify(cantieri));
  dbSalva('cantieri_v1',cantieri);
  const lista=getLista(); const idx=lista.findIndex(s=>s.id===currentId);
  if(idx>=0){lista[idx].cantiereId=cantiereId;salveLista(lista);}
  aggiornaBottoneAvvia(cantiereId);
  toast('✅ Cantiere avviato!','ok');
  setTimeout(()=>{window.location.href='cantiere.html?id='+cantiereId;},1200);
}

function getCantieri(){try{return JSON.parse(localStorage.getItem('cantieri_v1'))||[];}catch{return[];}}

// ── COPIA TESTO ──
function copiaTesto(){
  const ambTxt=ambienti.length?'\n\nAMBIENTI\n'+ambienti.map(a=>`${a.nome||'—'}: ${a.mq||'—'} mq`).join('\n'):'';
  let txt=`SOPRALLUOGO — ${gv('f-titolo')||gv('fc')||'—'} · ${gv('f-data')||new Date().toLocaleDateString('it-IT')}\n${'═'.repeat(36)}\nResponsabile: ${gv('f-resp')||'—'}\n\nCLIENTE\n${gv('fc')||'—'} · ${gv('ft')||'—'}\n\nCANTIERE\n${gv('fi')||'—'}${ambTxt}\n\nLAVORAZIONI\n${gv('fl')||'—'}`;
  if(gv('fn')) txt+=`\n\nNOTE\n${gv('fn')}`;
  navigator.clipboard.writeText(txt).then(()=>toast('✓ Copiato!','ok')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('✓ Copiato!','ok');
  });
}

// ── EXPORT / IMPORT ──
function esportaDati(){
  const note=JSON.parse(localStorage.getItem('note_v1')||'[]');
  const dati={versione:'1.0',data:new Date().toISOString(),sopralluoghi:getLista(),cantieri:getCantieri(),note};
  const blob=new Blob([JSON.stringify(dati,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`commessapro_backup_${new Date().toLocaleDateString('it-IT').replace(/\//g,'-')}.json`;
  a.click(); URL.revokeObjectURL(url); toast('✅ Dati esportati!','ok');
}

function leggiImport(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const dati=JSON.parse(e.target.result);
      if(!dati.sopralluoghi&&!dati.cantieri) throw new Error('File non valido');
      const nSop=(dati.sopralluoghi||[]).length, nCant=(dati.cantieri||[]).length;
      if(!confirm(`Trovati nel backup:\n- ${nSop} sopralluoghi\n- ${nCant} cantieri\n\nVuoi ripristinare?`)) return;
      if(dati.sopralluoghi&&dati.sopralluoghi.length>0){
        const esist=getLista(); const ids=new Set(esist.map(s=>s.id));
        const nuovi=dati.sopralluoghi.filter(s=>!ids.has(s.id));
        const aggiornati=esist.map(s=>{const b=dati.sopralluoghi.find(x=>x.id===s.id);return b||s;});
        salveLista([...nuovi,...aggiornati]);
      }
      if(dati.cantieri&&dati.cantieri.length>0){
        const ce=getCantieri(); const ci=new Set(ce.map(c=>c.id));
        const nc=dati.cantieri.filter(c=>!ci.has(c.id));
        const ac=ce.map(c=>{const b=dati.cantieri.find(x=>x.id===c.id);return b||c;});
        const lc=[...nc,...ac]; localStorage.setItem('cantieri_v1',JSON.stringify(lc)); dbSalva('cantieri_v1',lc);
      }
      if(dati.note&&dati.note.length>0){
        const ne=JSON.parse(localStorage.getItem('note_v1')||'[]'); const ni=new Set(ne.map(n=>n.id));
        const nn=dati.note.filter(n=>!ni.has(n.id));
        const nl=[...nn,...ne]; localStorage.setItem('note_v1',JSON.stringify(nl)); dbSalva('note_v1',nl);
      }
      renderLista();
      toast(`✅ Ripristinati ${nSop} sopralluoghi e ${nCant} cantieri`,'ok');
    }catch(err){toast('Errore: '+err.message,'err');}
  };
  reader.readAsText(file); input.value='';
}


// ── RUBRICA ──
function apriRubrica(){
  const clienti = JSON.parse(localStorage.getItem('rubrica_v1')||'[]');
  const el = g('rubrica-lista');
  if(!clienti.length){
    el.innerHTML='<div style="text-align:center;padding:24px;color:var(--muted)">Nessun cliente in rubrica.<br><a href="rubrica.html" style="color:var(--brick)">Vai alla Rubrica →</a></div>';
  } else {
    el.innerHTML = clienti.sort((a,b)=>a.nome.localeCompare(b.nome)).map(cli=>`
      <div onclick="selezionaCliente('${cli.id}')" style="padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:12px;-webkit-tap-highlight-color:rgba(212,81,30,0.1)">
        <div style="width:38px;height:38px;background:var(--brick-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🏢</div>
        <div>
          <div style="font-weight:600;font-size:14px;color:var(--white)">${cli.nome}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${cli.ref||''} ${cli.tel?'· '+cli.tel:''}</div>
        </div>
      </div>`).join('');
  }
  g('rubrica-modal').style.display='flex';
}

function selezionaCliente(id){
  const clienti = JSON.parse(localStorage.getItem('rubrica_v1')||'[]');
  const c = clienti.find(x=>x.id===id); if(!c) return;
  const nome = c.ref ? c.nome+' - '+c.ref : c.nome;
  const el = g('fc'); if(el) el.value = nome;
  const tel = g('ft'); if(tel && c.tel) tel.value = c.tel;
  const email = g('fe'); if(email && c.email) email.value = c.email;
  chiudiRubrica(); salva();
}

function chiudiRubrica(){ g('rubrica-modal').style.display='none'; }
