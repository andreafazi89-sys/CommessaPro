<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CommessaPro">
<meta name="theme-color" content="#0F0D0A">
<link rel="icon" href="logo-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Sopralluogo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Epilogue:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#FFFFFF;--surface:#F5F5F5;--surface2:#EBEBEB;--brick:#D4511E;--brick-dim:rgba(212,81,30,0.12);--sand:#8A6A50;--sand-dim:rgba(138,106,80,0.12);--white:#1A1612;--muted:#888280;--border:rgba(0,0,0,0.1);--green:#3A7A4C;--green-dim:rgba(58,122,76,0.12);--r:14px;--r-sm:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Epilogue',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}
.view{display:none;}.view.active{display:block;}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.save-ind{font-size:11px;color:var(--muted);}.save-ind.ok{color:var(--green);}
.btn-top{background:var(--sand-dim);color:var(--sand);border:none;border-radius:8px;padding:7px 12px;font-family:Epilogue,sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.btn-back{color:var(--muted);background:none;border:none;cursor:pointer;font-size:22px;padding:0;}
.prog{display:flex;gap:6px;padding:8px 16px 0;}
.ps{height:3px;flex:1;background:var(--border);border-radius:2px;transition:background .3s;}.ps.done{background:var(--brick);}
.content{padding:16px 16px 150px;}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;}
.sec-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sand);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-icon{width:28px;height:28px;background:var(--brick-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.fg{margin-bottom:12px;}.fg:last-child{margin-bottom:0;}
label{display:block;font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
input,textarea,select{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--white);font-family:'Epilogue',sans-serif;font-size:16px;outline:none;transition:border-color .15s;-webkit-appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--brick);}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:#1A1714;color:var(--white);}
textarea{resize:none;min-height:90px;line-height:1.6;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ambiente-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.ambiente-row input{flex:1;}
.ambiente-row .mq-inp{width:75px;flex:none;text-align:center;}
.ambiente-row .del-btn{background:var(--brick-dim);color:var(--brick);border:none;border-radius:8px;width:36px;height:48px;font-size:15px;cursor:pointer;flex-shrink:0;}
.voice-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;}
.voice-play{width:40px;height:40px;background:var(--brick);color:#fff;border:none;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.voice-play.playing{background:var(--green);}
.voice-info{flex:1;}.voice-dur{font-size:12px;color:var(--muted);}.voice-lbl{font-size:13px;font-weight:500;}
.voice-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;}
.rec-btn{width:100%;padding:14px;border:none;border-radius:var(--r-sm);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.rec-btn.idle{background:var(--surface2);color:var(--sand);border:1px solid var(--border);}
.rec-btn.recording{background:#C84040;color:#fff;animation:pulse-rec 1s infinite;}
@keyframes pulse-rec{0%,100%{opacity:1}50%{opacity:.7}}
.foto-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.foto-btn{padding:14px;background:var(--surface2);border:1.5px dashed var(--border);border-radius:var(--r-sm);text-align:center;cursor:pointer;}
.foto-btn:active{border-color:var(--brick);}
.foto-btn-icon{font-size:22px;margin-bottom:4px;}.foto-btn-lbl{font-size:12px;font-weight:500;color:var(--sand);}
input[type="file"]{display:none;}
.foto-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.foto-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--surface2);}
.foto-item img{width:100%;height:100%;object-fit:cover;display:block;}
.foto-del{position:absolute;top:3px;right:3px;width:22px;height:22px;background:rgba(0,0,0,.75);color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.foto-edit{position:absolute;top:3px;right:28px;width:22px;height:22px;background:rgba(0,0,0,.75);color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.foto-num{position:absolute;bottom:3px;left:5px;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);}
.foto-order{position:absolute;bottom:3px;right:3px;display:flex;gap:2px;}
.foto-order button{width:20px;height:20px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:4px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.foto-order span{width:20px;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 60%,transparent);z-index:100;display:flex;flex-direction:column;gap:8px;}
.btn-main{width:100%;padding:16px;background:var(--brick);color:#fff;border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none;}
.btn-main:active{transform:scale(.98);background:#B53D10;}
.btn-main.green{background:var(--green);}.btn-main.green:active{background:#357A42;}
.btn-row{display:flex;gap:8px;}
.btn-sec{flex:1;padding:13px 10px;background:var(--surface2);color:var(--sand);border:1px solid var(--border);border-radius:var(--r);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;-webkit-appearance:none;}
.report-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:#fff;display:none;flex-direction:column;}
.report-overlay.show{display:flex;}
.report-topbar{background:#1A1612;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rep-title{font-family:'Syne',sans-serif;font-size:15px;color:#fff;font-weight:700;}
.rep-actions{display:flex;gap:8px;}
.rep-btn{padding:8px 14px;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.rep-btn.close{background:rgba(255,255,255,.1);color:#fff;}
.rep-btn.print{background:var(--brick);color:#fff;}
.report-frame{flex:1;border:none;width:100%;}
.sketch-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:#1A1612;display:none;flex-direction:column;}
.sketch-overlay.show{display:flex;}
.sketch-topbar{padding:10px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sk-tools{flex:1;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.sk-tool{width:34px;height:34px;border-radius:8px;border:2px solid transparent;cursor:pointer;background:rgba(255,255,255,.1);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;padding:0;}
.sk-tool.active{border-color:#fff;}
.sketch-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:8px;}
#sketch-canvas{background:#fff;touch-action:none;border-radius:4px;}
.toast{position:fixed;top:70px;left:16px;right:16px;padding:14px 16px;border-radius:var(--r-sm);font-size:14px;font-weight:500;text-align:center;z-index:9999;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{background:var(--green);color:#fff;}
.toast.err{background:#C8441A;color:#fff;}
.toast.inf{background:var(--surface2);color:var(--white);border:1px solid var(--border);}
.sop-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;}
.sop-card:active{border-color:var(--brick);}
.sop-icon{width:44px;height:44px;background:var(--brick-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.sop-info{flex:1;min-width:0;}
.sop-nome{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sop-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.sop-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-txt{font-size:15px;font-weight:500;color:var(--sand);margin-bottom:6px;}
.empty-sub{font-size:13px;}
.divider{height:1px;background:var(--border);margin:14px 0;}
</style>
</head>
<body>

<div id="view-lista" class="view active">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <a href="index.html" style="color:var(--muted);text-decoration:none;font-size:22px">←</a>
      <div class="topbar-title">📋 Sopralluoghi</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-top" onclick="forcSync()" title="Sincronizza">🔄</button>
      <button class="btn-top" onclick="document.getElementById('import-input').click()">📥</button>
      <button class="btn-top" onclick="esportaDati()">📤</button>
      <button class="btn-top" onclick="nuovoSopralluogo()">+ Nuovo</button>
    </div>
  </div>

<div class="content" style="padding-bottom:40px"><div id="lista-container"></div></div>
</div>

<div id="view-form" class="view">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-back" onclick="tornaLista()">←</button>
      <div class="topbar-title" id="form-title">Nuovo Sopralluogo</div>
    </div>
    <span class="save-ind" id="si">● bozza</span>
  </div>
  <div class="prog">
    <div class="ps" id="p0"></div><div class="ps" id="p1"></div>
    <div class="ps" id="p2"></div><div class="ps" id="p3"></div>
  </div>
  <div class="content">

    <div class="section">
      <div class="sec-title"><div class="sec-icon">👷</div>Responsabile</div>
      <div class="row2">
        <div class="fg"><label>Responsabile</label>
          <select id="f-resp" onchange="salva()">
            <option>Andrea Fazi</option><option>Rino Lenti</option>
          </select>
        </div>
        <div class="fg"><label>Data sopralluogo</label><input type="date" id="f-data" oninput="salva()"></div>
      </div>
      <div class="fg"><label>Titolo / Descrizione lavoro *</label><input type="text" id="f-titolo" placeholder="Es. Ristrutturazione bagno, Infiltrazione 3° piano..." oninput="salva()"></div>
      <div class="fg"><label>Commessa</label><input type="text" id="f-commessa" placeholder="Es. WFP, IFAD, SQUARE..." oninput="salva()"></div>
    </div>

    <div class="section">
      <div class="sec-title">
        <div class="sec-icon">👤</div>Cliente
        <button onclick="apriRubrica()" style="margin-left:auto;background:var(--brick-dim);color:var(--brick);border:none;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:Epilogue,sans-serif">👥 Rubrica</button>
      </div>
      <div class="fg"><label>Nome e Cognome *</label><input type="text" id="fc" placeholder="Es. Marco Rossi" oninput="salva()"></div>
      <div class="row2">
        <div class="fg"><label>Telefono</label><input type="tel" id="ft" placeholder="333 000 0000" oninput="salva()"></div>
        <div class="fg"><label>Email</label><input type="email" id="fe" placeholder="email@..." oninput="salva()"></div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-icon">📍</div>Cantiere</div>
      <div class="fg"><label>Indirizzo *</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="text" id="fi" placeholder="Via, numero, città" oninput="salva()" style="flex:1">
            <button type="button" onclick="geoLocalizza()" title="Usa posizione attuale" style="width:46px;height:48px;background:var(--brick-dim);border:1.5px solid var(--brick);border-radius:var(--r-sm);font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center" id="geo-btn">📍</button>
            <button type="button" onclick="apriMappa()" title="Apri in Google Maps" style="width:46px;height:48px;background:var(--brick-dim);border:1.5px solid var(--brick);border-radius:var(--r-sm);font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">🗺️</button>

          <option>Normale — scale</option>
          <option>Difficile — scala stretta / mansarda</option>

      <div class="fg"><textarea id="fl" placeholder="Descrivi le lavorazioni richieste dal cliente..." oninput="salva()"></textarea></div>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-icon">🎙️</div>Note vocali
        <span id="rec-timer" style="margin-left:auto;font-size:12px;color:#C84040;font-family:Epilogue,sans-serif;text-transform:none;letter-spacing:0;font-weight:400;display:none">⏺ 0:00</span>
      </div>
      <div id="voice-list" style="margin-bottom:10px"></div>
      <button class="rec-btn idle" id="rec-btn" onclick="toggleRec()">
        <span id="rec-icon">🎙️</span><span id="rec-label">Inizia registrazione</span>
      </button>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-icon">📝</div>Note aggiuntive</div>
      <div class="fg"><textarea id="fn" placeholder="Osservazioni, preferenze cliente, materiali richiesti..." oninput="salva()"></textarea></div>
    </div>

    <div class="section">

  </div>
  <div class="bottom-bar">
    <div class="btn-row">
      <button class="btn-sec" onclick="avvisaSegretariaSopralluogo()">📱 Apri commessa</button>
      <button class="btn-sec" onclick="generaReport()" style="flex:2">📄 Genera Report</button>
    </div>
    <button class="btn-main green" id="btn-avvia" onclick="avviaCantiere()">🏗️ Avvia Cantiere</button>
  </div>
</div>

<div class="report-overlay" id="report-overlay">
  <div class="report-topbar">
    <div class="rep-title">📄 Report Sopralluogo</div>
    <div class="rep-actions">
      <button class="rep-btn close" onclick="chiudiReport()">✕ Chiudi</button>
      <button class="rep-btn print" onclick="document.getElementById('report-frame').contentWindow.print()">🖨️ PDF</button>
    </div>
  </div>
  <iframe id="report-frame" class="report-frame"></iframe>
</div>

<div class="sketch-overlay" id="sketch-overlay">
  <div class="sketch-topbar">
    <button class="rep-btn close" onclick="chiudiSketch()">✕ Chiudi</button>
    <div class="sk-tools">
      <button class="sk-tool sk-col active" style="background:#111111" onclick="skSetColore('#111111',this)" title="Nero"></button>
      <button class="sk-tool sk-col" style="background:#C81E1E" onclick="skSetColore('#C81E1E',this)" title="Rosso"></button>
      <button class="sk-tool sk-col" style="background:#1D4ED8" onclick="skSetColore('#1D4ED8',this)" title="Blu"></button>
      <button class="sk-tool sk-siz active" style="font-size:10px" onclick="skSetSpessore(3,this)" title="Tratto fine">●</button>
      <button class="sk-tool sk-siz" style="font-size:20px" onclick="skSetSpessore(8,this)" title="Tratto grosso">●</button>
      <button class="sk-tool" id="sk-gomma" onclick="skToggleGomma()" title="Gomma">🧽</button>
      <button class="sk-tool" onclick="skAnnulla()" title="Annulla ultimo tratto">↩️</button>
    </div>
    <button class="rep-btn print" onclick="salvaSketch()">💾 Salva</button>
  </div>
  <div class="sketch-wrap" id="sketch-wrap"><canvas id="sketch-canvas"></canvas></div>
</div>

<input type="file" id="import-input" accept=".json" style="display:none" onchange="leggiImport(this)">
<div class="toast" id="toast"></div>

<script>
// ── GUARD AUTH: gira prima di qualsiasi lettura dati o render ──
(function(){
  let u=null; try{u=JSON.parse(localStorage.getItem('cp_user'))||null;}catch{}
  if(!u||!u.email) window.location.replace('login.html');
})();

// ── SUPABASE ──
const SUPA_URL = 'https://iradzlocobsipjazracw.supabase.co';
const SUPA_KEY = 'sb_publishable_zFgRrNrmYSORug8N06heow_6vjl0fhH';
const LIST_KEY = 'sopralluoghi_v3';
// ── SEGRETARIA: configura qui numero WhatsApp (formato internazionale, no + né spazi) ──
const SEGRETARIA = {
  whatsapp: '393358413580'  // ← SOSTITUIRE con numero reale, es. '393331234567'
};
let db = null;

function initDB(){
  if(window.supabase) db = window.supabase.createClient(SUPA_URL, SUPA_KEY);
}
async function dbSalva(chiave, valore){
  if(!db) return;
  try{ await db.from('dati').upsert({chiave, valore, ts:new Date().toISOString()},{onConflict:'chiave'}); }
  catch(e){ console.warn('sync err',e); }
}
async function dbCarica(chiave){
  if(!db) return null;
  try{
    const {data} = await db.from('dati').select('valore').eq('chiave',chiave).maybeSingle();
    return data ? data.valore : null;
  }catch(e){ return null; }
}
async function forcSync(){
  toast('🔄 Sincronizzazione...','inf');
  const remoto = await dbCarica(LIST_KEY);
  if(remoto && Array.isArray(remoto) && remoto.length > 0){
    const locale = getLista();
    const locMap = new Map(locale.map(x => [x.id, x]));
    // FIX: merge intelligente
    // Per ogni sopralluogo remoto: se esiste una versione locale, manteniamo il LOCALE
    // (potrebbe avere foto che il remoto non ha ancora). Questo impedisce la perdita
    // di foto recenti quando il remoto è stato svuotato da versioni vecchie del codice.
    // Se il sopralluogo è solo remoto (mai visto in locale), lo prendiamo tal quale.
    const merged = remoto.map(r => {
      const l = locMap.get(r.id);
      if(!l) return r; // nuovo da remoto
      // Se il locale ha foto e il remoto no, tieni il locale (protezione perdita foto)
      const locFoto = (l.foto || []).length;
      const remFoto = (r.foto || []).length;
      if(locFoto > 0 && remFoto === 0) return l;
      // Altrimenti preferiamo i metadati più recenti del remoto
      // ma FONDENDO foto e noteVocali (unione senza duplicati per url)
      const foto = mergeArrayByKey(l.foto || [], r.foto || [], 'url');
      const noteVocali = mergeArrayByKey(l.noteVocali || [], r.noteVocali || [], 'url');
      return {...r, foto, noteVocali};
    });
    // Aggiungi sopralluoghi solo locali (mai visti in remoto)
    const remIds = new Set(remoto.map(x => x.id));
    const extra = locale.filter(x => !remIds.has(x.id));
    salveLista([...merged, ...extra]);
    renderLista();
  }
  toast('✓ Sincronizzato','ok');
}

// Utility: unisce due array di oggetti deduplicando per una chiave
function mergeArrayByKey(a, b, key){
  const seen = new Set();
  const out = [];
  [...a, ...b].forEach(item => {
    const v = item?.[key];
    if(v && !seen.has(v)){ seen.add(v); out.push(item); }
    else if(!v){ out.push(item); } // se manca la chiave, lo teniamo lo stesso
  });
  return out;
}

  // Quindi il record è leggero anche se ha foto. Non svuotiamo più nulla.
  // Però se c'è ancora qualche foto base64 vecchia (data:image/...), la rimuoviamo
  // prima del sync per evitare payload giganti.
  const lLight = l.map(s => {

async function toggleRec(){
  if(isRecording){fermaReg();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[]; recSeconds=0;
    let mimeType='audio/webm';
    if(MediaRecorder.isTypeSupported('audio/mp4')) mimeType='audio/mp4';
    mediaRecorder=new MediaRecorder(stream,{mimeType});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(audioChunks,{type:mimeType});
      const reader=new FileReader();
      reader.onload=ev=>{
        noteVocali.push({dur:recSeconds,b64:ev.target.result,type:mimeType,url:null});
        renderNoteVocali(); salva();
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start(100); isRecording=true;
    g('rec-btn').className='rec-btn recording';
    g('rec-icon').textContent='⏹'; g('rec-label').textContent='Tocca per fermare';
    g('rec-timer').style.display='block';
    recInterval=setInterval(()=>{
      recSeconds++;
      const m=Math.floor(recSeconds/60),s=recSeconds%60;
      g('rec-timer').textContent=`⏺ ${m}:${s.toString().padStart(2,'0')}`;
    },1000);
  }catch(e){toast('Microfono non disponibile','err');}
}

function fermaReg(){
  if(!isRecording) return;
  isRecording=false; clearInterval(recInterval); mediaRecorder?.stop();
  g('rec-btn').className='rec-btn idle';
  g('rec-icon').textContent='🎙️'; g('rec-label').textContent='Inizia registrazione';
  g('rec-timer').style.display='none';
}

  el.innerHTML=noteVocali.map((n,i)=>`

}

function caricaFoto(input){
  const files = [...input.files];
  input.value = '';
  files.forEach(file => processaFoto(file));
}

// Carica un blob sul bucket "Foto" e ritorna il publicUrl (o lancia errore)
async function caricaBlobSuStorage(blob, path, contentType){
  if(!db){ throw new Error('No Supabase client'); }
  const {error} = await db.storage.from('Foto').upload(path, blob, {
    contentType: contentType,
    upsert: false
  });
  if(error){ throw error; }
  const {data} = db.storage.from('Foto').getPublicUrl(path);
  return data.publicUrl;
}

async function processaFoto(file){
  // 1) Comprimi l'immagine in locale (canvas → jpeg ~85% qualità, max 2000px)
  const compressedBlob = await comprimiImmagine(file, 2000, 0.85);
  // 2) Carica su Supabase Storage (bucket "Foto", cartella sopralluoghi/<sopId>)
  const fileName = Date.now() + '.jpg';
  const sopId = currentId || 'sop_' + Date.now();
  if(!currentId) currentId = sopId; // nel caso stia iniziando un nuovo sopralluogo
  const path = `sopralluoghi/${sopId}/${fileName}`;
  // Placeholder locale (base64) mostrato subito in UI durante upload
  const tempUrl = URL.createObjectURL(compressedBlob);
  const placeholder = {url: tempUrl, uploading: true, localPath: path};
  foto.push(placeholder);
  renderFoto();

  try{
    const publicUrl = await caricaBlobSuStorage(compressedBlob, path, 'image/jpeg');
    // Sostituisci il placeholder con l'URL vero
    const idx = foto.findIndex(f => f === placeholder);
    if(idx >= 0){
      foto[idx] = {url: publicUrl};
    }
    URL.revokeObjectURL(tempUrl);
    renderFoto();
    salva();
  }catch(e){
    console.error('Upload foto fallito:', e);
    // Rimuovi placeholder
    const idx = foto.findIndex(f => f === placeholder);
    if(idx >= 0) foto.splice(idx, 1);
    URL.revokeObjectURL(tempUrl);
    renderFoto();
    toast('⚠️ Foto non caricata (rete?)', 'inf');
  }
}

// Comprimi file immagine usando canvas, ritorna Blob JPEG
function comprimiImmagine(file, maxSide = 2000, quality = 0.85){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Lettura file fallita'));
    reader.onload = e => {
      const img = new Image();
      img.onerror = () => reject(new Error('Immagine non valida'));
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > h){ if(w > maxSide){ h = Math.round(h * maxSide / w); w = maxSide; } }
        else    { if(h > maxSide){ w = Math.round(w * maxSide / h); h = maxSide; } }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(b => b ? resolve(b) : reject(new Error('Compressione fallita')),
                      'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderFoto(){
  const totalKB = Math.round(foto.reduce((s,f) => {
    const u = f?.url || '';
    if(u.startsWith('data:')) return s + (u.length * 0.75 / 1024); // base64 legacy
    return s; // URL cloud non pesano localmente
  }, 0));
  const nf = foto.length;
  const uploading = foto.filter(f => f.uploading).length;
  let txt = nf + ' foto';
  if(totalKB > 0) txt += ' · ' + totalKB + 'KB';
  if(uploading > 0) txt += ' · ⏳ ' + uploading + ' in upload';
  g('fnum').textContent = txt;
  if(totalKB > 800) g('fnum').style.color = '#E05252';
  else g('fnum').style.color = 'var(--muted)';
  const grid = g('foto-grid');
  if(!foto.length){ grid.innerHTML = ''; aggiornaProg(); return; }
  grid.innerHTML = foto.map((f,i) => `
    <div class="foto-item" ${f.uploading ? 'style="opacity:0.6"' : ''}>
      <img src="${f.url}">
      ${f.uploading ? '<div style="position:absolute;top:4px;left:4px;background:rgba(0,0,0,0.6);color:#fff;padding:2px 6px;border-radius:4px;font-size:10px">⏳ Upload…</div>' : ''}
      <button class="foto-del" onclick="delFoto(${i})">✕</button>
      ${!f.uploading ? `<button class="foto-edit" onclick="apriSketchFoto(${i})" title="Disegna sulla foto">✏️</button>` : ''}
      <span class="foto-num">${i+1}</span>
      <div class="foto-order">
        ${i>0?`<button onclick="muoviFoto(${i},-1)">◀</button>`:'<span></span>'}
        ${i<foto.length-1?`<button onclick="muoviFoto(${i},+1)">▶</button>`:'<span></span>'}
      </div>
    </div>`).join('');
  aggiornaProg();
}

function muoviFoto(i, dir){
  const j = i+dir;
  if(j<0||j>=foto.length) return;
  [foto[i],foto[j]]=[foto[j],foto[i]];
  renderFoto(); salva();
}
async function delFoto(i){
  const f = foto[i];
  foto.splice(i, 1);
  renderFoto();
  salva();
  // Se era una foto su Storage, prova a eliminarla anche lì (best-effort)
  if(f?.url?.includes('/storage/v1/object/public/Foto/')){
    try{
      const path = f.url.split('/storage/v1/object/public/Foto/')[1];
      if(path && db){
        const paths = [path];
        // Gli schizzi hanno anche il JSON dei tratti: eliminiamo pure quello
        if(f.strokesPath) paths.push(f.strokesPath);
        await db.storage.from('Foto').remove(paths);
      }
    }catch(e){ /* ignoriamo errori di eliminazione, la foto è rimossa dal record comunque */ }
  }
}

// ── SCHIZZI A PENNA (canvas) ──
let skCanvas=null, skCtx=null, skLayer=null, skLayerCtx=null;
let skStrokes=[], skCurrent=null, skLastDrawn=0;
let skColor='#111111', skSize=3, skEraser=false;
let skPenSeen=false, skDrawing=false, skPointerId=null;
let skBgImg=null, skBgUrl=null, skInit=false;

function skSetupListeners(){
  if(skInit) return;
  skInit=true;
  skCanvas=g('sketch-canvas');
  skCtx=skCanvas.getContext('2d');
  skCanvas.addEventListener('pointerdown',skDown);
  skCanvas.addEventListener('pointermove',skMove);
  skCanvas.addEventListener('pointerup',skUp);
  skCanvas.addEventListener('pointercancel',skUp);
}

function apriSketchNuovo(){ apriSketch(null,null); }

function apriSketchFoto(i){
  const f=foto[i];
  if(!f||!f.url||f.uploading) return;
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>apriSketch(img,f.url);
  img.onerror=()=>toast('⚠️ Foto non caricabile per lo schizzo','err');
  img.src=f.url;
}

function apriSketch(bgImg,bgUrl){
  skSetupListeners();
  skBgImg=bgImg; skBgUrl=bgUrl;
  skStrokes=[]; skCurrent=null; skPenSeen=false; skDrawing=false; skPointerId=null;
  skEraser=false; g('sk-gomma').classList.remove('active');
  g('sketch-overlay').classList.add('show');
  // Il canvas va dimensionato quando l'overlay ha gia un layout
  requestAnimationFrame(skDimensiona);
}

function skDimensiona(){
  const wrap=g('sketch-wrap');
  const dpr=window.devicePixelRatio||1;
  const maxW=wrap.clientWidth-16, maxH=wrap.clientHeight-16;
  let w=maxW, h=maxH;
  if(skBgImg){
    const sc=Math.min(maxW/skBgImg.width, maxH/skBgImg.height);
    w=Math.round(skBgImg.width*sc); h=Math.round(skBgImg.height*sc);
  }
  skCanvas.style.width=w+'px'; skCanvas.style.height=h+'px';
  skCanvas.width=Math.round(w*dpr); skCanvas.height=Math.round(h*dpr);
  skLayer=document.createElement('canvas');
  skLayer.width=skCanvas.width; skLayer.height=skCanvas.height;
  skLayerCtx=skLayer.getContext('2d');
  skRidisegna();
}

// Compone il canvas visibile: fondo bianco + eventuale foto + layer tratti
function skComponi(){
  skCtx.fillStyle='#fff';
  skCtx.fillRect(0,0,skCanvas.width,skCanvas.height);
  if(skBgImg) skCtx.drawImage(skBgImg,0,0,skCanvas.width,skCanvas.height);
  skCtx.drawImage(skLayer,0,0);
}

// Ridisegna da zero il layer tratti (dopo undo o ridimensionamento)
function skRidisegna(){
  skLayerCtx.clearRect(0,0,skLayer.width,skLayer.height);
  skStrokes.forEach(s=>skTracciaStroke(skLayerCtx,s));
  skComponi();
}

function skTracciaStroke(ctx2,s){
  if(!s.points.length) return;
  if(s.points.length===1){ skTracciaPunto(ctx2,s); return; }
  for(let i=1;i<s.points.length;i++) skTracciaSegmento(ctx2,s,i);
}

function skTracciaPunto(ctx2,s){
  const [x,y,p]=s.points[0];
  ctx2.save();
  ctx2.globalCompositeOperation=s.eraser?'destination-out':'source-over';
  ctx2.fillStyle=s.color;
  ctx2.beginPath();
  ctx2.arc(x,y,Math.max(1,s.size*((p||0.5)*2)/2),0,Math.PI*2);
  ctx2.fill();
  ctx2.restore();
}

// Disegna il segmento che arriva al punto i, smussato con curva quadratica tra i punti medi
function skTracciaSegmento(ctx2,s,i){
  const pts=s.points;
  const [x0,y0,p0]=pts[i-1], [x1,y1,p1]=pts[i];
  const mx0=i>1?(pts[i-2][0]+x0)/2:x0, my0=i>1?(pts[i-2][1]+y0)/2:y0;
  const mx1=(x0+x1)/2, my1=(y0+y1)/2;
  ctx2.save();
  ctx2.globalCompositeOperation=s.eraser?'destination-out':'source-over';
  ctx2.strokeStyle=s.color;
  ctx2.lineCap='round'; ctx2.lineJoin='round';
  ctx2.lineWidth=Math.max(1,s.size*(((p0+p1)/2||0.5)*2));
  ctx2.beginPath();
  ctx2.moveTo(mx0,my0);
  ctx2.quadraticCurveTo(x0,y0,mx1,my1);
  ctx2.stroke();
  ctx2.restore();
}

// Coordinate in pixel del buffer canvas + pressione (0.5 se non disponibile)
function skPunto(e){
  const r=skCanvas.getBoundingClientRect();
  const x=(e.clientX-r.left)*(skCanvas.width/r.width);
  const y=(e.clientY-r.top)*(skCanvas.height/r.height);
  const p=e.pointerType==='pen'?(e.pressure||0.5):0.5;
  return [Math.round(x*10)/10, Math.round(y*10)/10, Math.round(p*100)/100];
}

function skDown(e){
  if(e.pointerType==='pen') skPenSeen=true;
  // Palm rejection: se in questa sessione c'e stata una penna, il touch non disegna
  if(e.pointerType==='touch'&&skPenSeen) return;
  if(skDrawing) return;
  e.preventDefault();
  skDrawing=true; skPointerId=e.pointerId;
  try{ skCanvas.setPointerCapture(e.pointerId); }catch(err){}
  skCurrent={color:skColor,size:skSize*(window.devicePixelRatio||1),eraser:skEraser,points:[skPunto(e)]};
  skLastDrawn=0;
  skTracciaPunto(skLayerCtx,skCurrent);
  skComponi();
}

function skMove(e){
  if(!skDrawing||e.pointerId!==skPointerId||!skCurrent) return;
  e.preventDefault();
  const coalesced=e.getCoalescedEvents?e.getCoalescedEvents():[];
  const evts=coalesced.length?coalesced:[e];
  evts.forEach(ev=>skCurrent.points.push(skPunto(ev)));
  for(let i=skLastDrawn+1;i<skCurrent.points.length;i++) skTracciaSegmento(skLayerCtx,skCurrent,i);
  skLastDrawn=skCurrent.points.length-1;
  skComponi();
}

function skUp(e){
  if(!skDrawing||e.pointerId!==skPointerId) return;
  skDrawing=false; skPointerId=null;
  if(skCurrent&&skCurrent.points.length) skStrokes.push(skCurrent);
  skCurrent=null;
}

function skSetColore(c,btn){
  skColor=c; skEraser=false;
  g('sk-gomma').classList.remove('active');
  document.querySelectorAll('.sk-col').forEach(b=>b.classList.toggle('active',b===btn));
}

function skSetSpessore(n,btn){
  skSize=n;
  document.querySelectorAll('.sk-siz').forEach(b=>b.classList.toggle('active',b===btn));
}

function skToggleGomma(){
  skEraser=!skEraser;
  g('sk-gomma').classList.toggle('active',skEraser);
}

function skAnnulla(){
  if(!skStrokes.length) return;
  skStrokes.pop();
  skRidisegna();
}

function chiudiSketch(){
  if(skStrokes.length&&!confirm('Chiudere senza salvare lo schizzo?')) return;
  g('sketch-overlay').classList.remove('show');
}

async function salvaSketch(){
  if(!skStrokes.length){ toast('Nessun tratto da salvare','inf'); return; }
  skComponi();
  const blob=await new Promise(res=>skCanvas.toBlob(res,'image/png'));
  if(!blob){ toast('⚠️ Errore nella creazione dello schizzo','err'); return; }
  const ts=Date.now();
  const sopId=currentId||'sop_'+ts;
  if(!currentId) currentId=sopId;
  const pngPath=`sopralluoghi/${sopId}/sketch_${ts}.png`;
  const jsonPath=`sopralluoghi/${sopId}/sketch_${ts}.json`;
  const strokesJson=new Blob(
    [JSON.stringify({w:skCanvas.width,h:skCanvas.height,bgUrl:skBgUrl||null,strokes:skStrokes})],
    {type:'application/json'});
  g('sketch-overlay').classList.remove('show');
  skStrokes=[];
  // Placeholder in griglia durante upload, come processaFoto
  const tempUrl=URL.createObjectURL(blob);
  const placeholder={url:tempUrl,uploading:true,localPath:pngPath,sketch:true};
  foto.push(placeholder);
  renderFoto();
  try{
    const [publicUrl]=await Promise.all([
      caricaBlobSuStorage(blob,pngPath,'image/png'),
      caricaBlobSuStorage(strokesJson,jsonPath,'application/json')
    ]);
    const idx=foto.findIndex(f=>f===placeholder);
    if(idx>=0) foto[idx]={url:publicUrl,sketch:true,strokesPath:jsonPath};
    URL.revokeObjectURL(tempUrl);
    renderFoto();
    salva();
  }catch(e){
    console.error('Upload schizzo fallito:',e);
    const idx=foto.findIndex(f=>f===placeholder);
    if(idx>=0) foto.splice(idx,1);
    URL.revokeObjectURL(tempUrl);
    renderFoto();
    toast('⚠️ Schizzo non caricato (rete?)','inf');
  }
}

function aggiornaBottoneAvvia(cantiereId){

  const esiste = cantiereId && cantieri.some(c=>c.id===cantiereId);

function leggiImport(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const dati=JSON.parse(e.target.result);
      if(!dati.sopralluoghi&&!dati.cantieri) throw new Error('File non valido');
      const nSop=(dati.sopralluoghi||[]).length, nCant=(dati.cantieri||[]).length;
      if(!confirm(`Trovati nel backup:\n- ${nSop} sopralluoghi\n- ${nCant} cantieri\n\nVuoi ripristinare?`)) return;
      if(dati.sopralluoghi&&dati.sopralluoghi.length>0){
        const esist=getLista(); const ids=new Set(esist.map(s=>s.id));
        const nuovi=dati.sopralluoghi.filter(s=>!ids.has(s.id));
        const aggiornati=esist.map(s=>{const b=dati.sopralluoghi.find(x=>x.id===s.id);return b||s;});
        salveLista([...nuovi,...aggiornati]);
      }
      if(dati.cantieri&&dati.cantieri.length>0){
        const ce=getCantieri(); const ci=new Set(ce.map(c=>c.id));
        const nc=dati.cantieri.filter(c=>!ci.has(c.id));
        const ac=ce.map(c=>{const b=dati.cantieri.find(x=>x.id===c.id);return b||c;});
        const lc=[...nc,...ac]; localStorage.setItem('cantieri_v1',JSON.stringify(lc)); dbSalva('cantieri_v1',lc);
      }
      if(dati.note&&dati.note.length>0){
        const ne=JSON.parse(localStorage.getItem('note_v1')||'[]'); const ni=new Set(ne.map(n=>n.id));
        const nn=dati.note.filter(n=>!ni.has(n.id));
        const nl=[...nn,...ne]; localStorage.setItem('note_v1',JSON.stringify(nl)); dbSalva('note_v1',nl);
      }
      renderLista();
      toast(`✅ Ripristinati ${nSop} sopralluoghi e ${nCant} cantieri`,'ok');
    }catch(err){toast('Errore: '+err.message,'err');}
  };
  reader.readAsText(file); input.value='';
}

// ── GEO-LOCALIZZAZIONE ──
function geoLocalizza(){
  const btn = document.getElementById('geo-btn');
  if(!navigator.geolocation){ toast('GPS non supportato dal browser','err'); return; }
  if(location.protocol!=='https:' && location.hostname!=='localhost'){
    toast('GPS richiede HTTPS','err'); return;
  }
  btn.textContent = '⏳'; btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const {latitude: lat, longitude: lon} = pos.coords;
      try{
        const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=18&addressdetails=1&accept-language=it`;
        const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
        if(!res.ok) throw new Error('HTTP '+res.status);
        const data = await res.json();
        if(!data || !data.address) throw new Error('Nessun indirizzo trovato per queste coordinate');
        const addr = data.address;
        const road = addr.road || addr.pedestrian || addr.footway || addr.path || addr.cycleway || addr.neighbourhood || addr.suburb || addr.hamlet || '';
        const num = addr.house_number ? ' '+addr.house_number : '';
        const cap = addr.postcode || '';
        const city = addr.city || addr.town || addr.village || addr.municipality || addr.hamlet || '';
        let full = '';
        if(road){
          full = (road + num).trim();
          if(cap || city) full += (full?', ':'') + (cap?cap+' ':'') + city;
          full = full.trim();
        } else if(data.display_name){
          // niente via riconoscibile: meglio indirizzo completo di Nominatim che solo CAP
          full = data.display_name;
        }
        if(full){
          document.getElementById('fi').value = full;
          currentLat = lat; currentLon = lon;
          salva();
          toast('📍 Posizione rilevata','ok');
        } else {
          // fallback: uso display_name di Nominatim
          if(data.display_name){
            document.getElementById('fi').value = data.display_name;
            currentLat = lat; currentLon = lon;
            salva();
            toast('📍 Posizione rilevata (approssimata)','ok');
          } else {
            toast('Indirizzo non trovato — salvate solo coordinate','inf');
            currentLat = lat; currentLon = lon;
            salva();
          }
        }
      }catch(e){
        console.error('Geoloc error:', e);
        // Anche se il reverse geocoding fallisce, salvo le coordinate
        currentLat = lat; currentLon = lon;
        toast('Rete lenta: salvate solo coordinate ('+e.message+')','err');
      }
      finally{ btn.textContent = '📍'; btn.disabled = false; }
    },
    err => {
      btn.textContent = '📍'; btn.disabled = false;
      const msg = {
        1:'Permesso negato — abilita la posizione nelle impostazioni',
        2:'Posizione non disponibile (GPS spento?)',
        3:'Timeout scaduto — riprova'
      }[err.code] || 'Errore sconosciuto';
      toast(msg,'err');
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function apriMappa(){
  // Priorità: lat/lon precise, altrimenti indirizzo testuale
  if(currentLat!=null && currentLon!=null){
    window.open(`https://www.google.com/maps/search/?api=1&query=${currentLat},${currentLon}`,'_blank');
    return;
  }
  const ind = gv('fi');
  if(!ind){ toast('Nessun indirizzo o posizione da aprire','err'); return; }
  window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ind)}`,'_blank');
}

// ── INIT ──
initDB();
renderLista();
mostraOnboarding();
// Sync da Supabase in background
setTimeout(()=>forcSync().catch(()=>{}), 500);
</script>
