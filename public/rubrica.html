<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CommessaPro">
<meta name="theme-color" content="#0F0D0A">
<link rel="icon" href="logo-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Rubrica</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Epilogue:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#FFFFFF;--surface:#F5F5F5;--surface2:#EBEBEB;--brick:#D4511E;--brick-dim:rgba(212,81,30,0.12);--sand:#8A6A50;--sand-dim:rgba(138,106,80,0.12);--white:#1A1612;--muted:#888280;--border:rgba(0,0,0,0.1);--green:#3A7A4C;--green-dim:rgba(58,122,76,0.12);--r:14px;--r-sm:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Epilogue',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}
.view{display:none;}.view.active{display:block;}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.btn-back{color:var(--muted);background:none;border:none;cursor:pointer;font-size:22px;padding:0;}
.btn-top{background:var(--sand-dim);color:var(--sand);border:none;border-radius:8px;padding:7px 12px;font-family:Epilogue,sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.content{padding:16px 16px 120px;}
.cliente-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.cli-avatar{width:44px;height:44px;background:var(--brick-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cli-info{flex:1;min-width:0;}
.cli-nome{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cli-tel{font-size:12px;color:var(--muted);margin-top:2px;}
.cli-actions{display:flex;gap:6px;}
.cli-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:var(--muted);}
.form-panel{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:16px;z-index:200;transform:translateY(100%);transition:transform .25s;padding-bottom:max(16px,env(safe-area-inset-bottom));}
.form-panel.show{transform:translateY(0);}
.form-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--sand);margin-bottom:12px;}
.fg{margin-bottom:10px;}
label{display:block;font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
input{width:100%;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--white);font-family:'Epilogue',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
input:focus{border-color:var(--brick);}
input::placeholder{color:var(--muted);}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.btn-cancel{flex:1;padding:13px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:var(--r-sm);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-ok{flex:2;padding:13px;background:var(--brick);color:#fff;border:none;border-radius:var(--r-sm);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-add-fab{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));right:20px;width:56px;height:56px;background:var(--brick);color:#fff;border:none;border-radius:50%;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(212,81,30,.4);z-index:100;}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-txt{font-size:15px;font-weight:500;color:var(--sand);margin-bottom:6px;}
.toast{position:fixed;top:70px;left:16px;right:16px;padding:14px 16px;border-radius:var(--r-sm);font-size:14px;font-weight:500;text-align:center;z-index:999;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{background:var(--green);color:#fff;}
.toast.err{background:#C8441A;color:#fff;}
.ro-banner{display:none;background:#1D4ED8;color:#fff;padding:10px 16px;font-size:13px;font-weight:600;text-align:center;letter-spacing:.3px;}
body.ro .ro-banner{display:block;}
body.ro input{pointer-events:none;opacity:.6;}
body.ro .btn-add-fab,body.ro .form-panel,body.ro .cli-edit,body.ro .cli-del{display:none!important;}
.onboarding-banner{background:var(--brick-dim);padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.onboarding-text{font-size:13px;line-height:1.6;color:var(--white);}
.onboarding-dismiss{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--brick);cursor:pointer;-webkit-user-select:none;}
.onboarding-dismiss input[type=checkbox]{width:16px;height:16px;accent-color:var(--brick);flex-shrink:0;cursor:pointer;}
</style>
</head>
<body>

<div class="ro-banner">🔒 Modalità sola lettura</div>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <a href="index.html" style="color:var(--muted);text-decoration:none;font-size:22px">←</a>
    <div class="topbar-title">👥 Rubrica Clienti</div>
  </div>
  <button onclick="forcSync()" style="background:var(--sand-dim);color:var(--sand);border:none;border-radius:8px;padding:7px 10px;font-size:14px;cursor:pointer" title="Sincronizza">🔄</button>
</div>
<div id="ob-banner" style="background:#FFF3ED;border:1px solid #D4511E;border-radius:12px;margin:12px 16px;padding:14px">
  <div style="font-size:13px;line-height:1.6;margin-bottom:10px">👥 Rubrica Clienti — Salva i tuoi clienti con nome, telefono e email. Potrai selezionarli direttamente quando crei un nuovo sopralluogo.</div>
  <button onclick="dismissBanner()" style="background:#D4511E;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">✓ Ho capito</button>
</div>
<script>(function(){var u=JSON.parse(localStorage.getItem('cp_user')||'null');var k='ob_rub';var k2='ob_rub_'+(u&&u.email?u.email:'');if(localStorage.getItem(k)==='1'||localStorage.getItem(k2)==='1'){var b=document.getElementById('ob-banner');if(b)b.style.display='none';}})();function dismissBanner(){var u=JSON.parse(localStorage.getItem('cp_user')||'null');localStorage.setItem('ob_rub','1');if(u&&u.email)localStorage.setItem('ob_rub_'+u.email,'1');document.getElementById('ob-banner').style.display='none';}</script>
<div class="content">
  <div id="lista-clienti"></div>
</div>

<button class="btn-add-fab" onclick="apriForm(null)">+</button>

<div class="form-panel" id="form-panel">
  <div class="form-title" id="form-panel-title">Nuovo cliente</div>
  <input type="hidden" id="edit-id">
  <div class="fg"><label>Nome / Azienda *</label><input type="text" id="cli-nome" placeholder="Es. WFP - Casciotti"></div>
  <div class="fg"><label>Referente</label><input type="text" id="cli-ref" placeholder="Es. Alessandro Casciotti"></div>
  <div class="fg"><label>Telefono</label><input type="tel" id="cli-tel" placeholder="333 000 0000"></div>
  <div class="fg"><label>Email</label><input type="email" id="cli-email" placeholder="email@..."></div>
  <div class="fg"><label>Note</label><input type="text" id="cli-note" placeholder="Es. IFAD piano 3, citofono Rossi..."></div>
  <div class="btn-row">
    <button class="btn-cancel" onclick="chiudiForm()">Annulla</button>
    <button class="btn-ok" onclick="salvaCliente()">✓ Salva</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── AUTH ──
(function(){try{const u=JSON.parse(localStorage.getItem('cp_user'));if(!u||!u.email)window.location.replace('login.html');}catch(e){window.location.replace('login.html');}})();
(function(){try{const u=JSON.parse(localStorage.getItem('cp_user'));if(u&&u.permessi&&u.permessi.rubrica==='readonly')document.body.classList.add('ro');}catch(e){}})();
// ── SUPABASE ──
const SUPA_URL='https://iradzlocobsipjazracw.supabase.co';
const SUPA_KEY='sb_publishable_zFgRrNrmYSORug8N06heow_6vjl0fhH';
const CLI_KEY='rubrica_v1';
let db=null;
function initDB(){if(window.supabase)db=window.supabase.createClient(SUPA_URL,SUPA_KEY);}
async function dbSalva(k,v){if(!db)return;try{await db.from('dati').upsert({chiave:k,valore:v,ts:new Date().toISOString()},{onConflict:'chiave'});}catch(e){}}
async function forcSync(){
  if(!db)return;
  try{
    const {data}=await db.from('dati').select('valore').eq('chiave',CLI_KEY).maybeSingle();
    if(data&&data.valore){ localStorage.setItem(CLI_KEY,JSON.stringify(data.valore)); renderLista(); }
  }catch(e){}
}

const g=id=>document.getElementById(id);
const gv=id=>g(id)?.value?.trim()||'';
function toast(msg,tipo='ok'){const t=g('toast');t.textContent=msg;t.className='toast '+tipo+' show';clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);}

function getClienti(){try{return JSON.parse(localStorage.getItem(CLI_KEY))||[];}catch{return[];}}
function salvaClienti(l){localStorage.setItem(CLI_KEY,JSON.stringify(l));dbSalva(CLI_KEY,l);}

function renderLista(){
  const lista=getClienti().sort((a,b)=>a.nome.localeCompare(b.nome));
  const el=g('lista-clienti');
  if(!lista.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-txt">Nessun cliente</div><div style="font-size:13px;color:var(--muted)">Premi + per aggiungere il primo cliente</div></div>`;
    return;
  }
  el.innerHTML=lista.map(c=>`
    <div class="cliente-card">
      <div class="cli-avatar">🏢</div>
      <div class="cli-info">
        <div class="cli-nome">${c.nome}</div>
        <div class="cli-tel">${c.ref?c.ref+' · ':''} ${c.tel||''} ${c.email?'· '+c.email:''}</div>
        ${c.note?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${c.note}</div>`:''}
      </div>
      <div class="cli-actions">
        <button class="cli-btn" onclick="chiamaCliente('${c.tel||''}')">📞</button>
        <button class="cli-btn cli-edit" onclick="apriForm('${c.id}')">✏️</button>
        <button class="cli-btn cli-del" onclick="eliminaCliente('${c.id}')">🗑</button>
      </div>
    </div>`).join('');
}

function chiamaCliente(tel){if(tel) window.location.href='tel:'+tel;}

function apriForm(id){
  g('edit-id').value=id||'';;
  if(id){
    const c=getClienti().find(x=>x.id===id);if(!c)return;
    g('form-panel-title').textContent='Modifica cliente';
    g('cli-nome').value=c.nome||'';;
    g('cli-ref').value=c.ref||'';;
    g('cli-tel').value=c.tel||'';;
    g('cli-email').value=c.email||'';;
    g('cli-note').value=c.note||'';;
  }else{
    g('form-panel-title').textContent='Nuovo cliente';
    ['cli-nome','cli-ref','cli-tel','cli-email','cli-note'].forEach(id=>{g(id).value='';});
  }
  g('form-panel').classList.add('show');
  setTimeout(()=>g('cli-nome').focus(),300);
}

function chiudiForm(){g('form-panel').classList.remove('show');}

function salvaCliente(){
  const nome=gv('cli-nome');
  if(!nome){toast('Inserisci il nome del cliente','err');return;}
  const lista=getClienti();
  const editId=gv('edit-id');
  const dati={id:editId||'cli_'+Date.now(),nome,ref:gv('cli-ref'),tel:gv('cli-tel'),email:gv('cli-email'),note:gv('cli-note')};
  if(editId){const i=lista.findIndex(x=>x.id===editId);if(i>=0)lista[i]=dati;else lista.push(dati);}
  else lista.push(dati);
  salvaClienti(lista);chiudiForm();renderLista();
  toast(editId?'✓ Cliente aggiornato':'✓ Cliente aggiunto');
}

function eliminaCliente(id){
  if(!confirm('Eliminare questo cliente?'))return;
  salvaClienti(getClienti().filter(x=>x.id!==id));renderLista();toast('Eliminato','ok');
}

// ── INIT ──
initDB();renderLista();
setTimeout(()=>forcSync().catch(()=>{}),500);
setInterval(()=>{ if(!document.hidden) forcSync().catch(()=>{}); },30000);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) forcSync().catch(()=>{}); });
</script>
</body>
</html>
