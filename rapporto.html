<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CommessaPro">
<meta name="theme-color" content="#0F0D0A">
<link rel="icon" href="logo-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>I miei rapporti</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Epilogue:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#FFFFFF;--surface:#F5F5F5;--surface2:#EBEBEB;--brick:#D4511E;--brick-dim:rgba(212,81,30,0.12);--sand:#8A6A50;--sand-dim:rgba(138,106,80,0.12);--white:#1A1612;--muted:#888280;--border:rgba(0,0,0,0.1);--green:#3A7A4C;--green-dim:rgba(58,122,76,0.12);--r:14px;--r-sm:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Epilogue',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}
.view{display:none;}.view.active{display:block;}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.btn-back{color:var(--muted);background:none;border:none;cursor:pointer;font-size:22px;padding:0;}
.btn-top{background:var(--sand-dim);color:var(--sand);border:none;border-radius:8px;padding:7px 12px;font-family:Epilogue,sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.content{padding:16px 16px 120px;}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;}
.sec-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sand);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-icon{width:28px;height:28px;background:var(--brick-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.fg{margin-bottom:12px;}.fg:last-child{margin-bottom:0;}
label{display:block;font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
input,textarea,select{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--white);font-family:'Epilogue',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--brick);}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:#FFFFFF;color:var(--white);}
textarea{resize:none;min-height:70px;line-height:1.5;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row-split{display:grid;grid-template-columns:2fr 1fr;gap:10px;}
.btn-main{width:100%;padding:16px;background:var(--brick);color:#fff;border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none;}
.btn-main:active{transform:scale(.98);}
.btn-main.green{background:var(--green);}
.btn-main.sec{background:var(--surface2);color:var(--white);border:1px solid var(--border);}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 70%,transparent);z-index:100;display:flex;gap:10px;}
.bottom-bar .btn-main{flex:1;}
.toast{position:fixed;top:70px;left:16px;right:16px;padding:14px 16px;border-radius:var(--r-sm);font-size:14px;font-weight:500;text-align:center;z-index:999;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{background:var(--green);color:#fff;}
.toast.err{background:#C8441A;color:#fff;}
.toast.inf{background:var(--surface2);color:var(--white);border:1px solid var(--border);}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-txt{font-size:15px;font-weight:500;color:var(--sand);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--muted);}
/* Card rapporto (lista) */
.rpt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.rpt-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px;}
.rpt-data{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.rpt-cant{font-size:12px;color:var(--sand);margin-top:2px;font-weight:500;}
.rpt-ore{font-size:13px;font-weight:700;color:var(--brick);background:var(--brick-dim);padding:4px 10px;border-radius:20px;white-space:nowrap;}
.rpt-desc{font-size:13px;line-height:1.5;color:var(--white);margin-top:4px;}
.rpt-sub{font-size:12px;color:var(--muted);margin-top:6px;font-style:italic;}
.rpt-actions{display:flex;gap:8px;margin-top:10px;}
.rpt-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:Epilogue,sans-serif;}
.rpt-btn.edit{background:var(--sand-dim);color:var(--sand);}
.rpt-btn.del{background:rgba(200,68,26,.12);color:#C8441A;}
.rpt-btn.pdf{background:var(--green-dim);color:var(--green);border:1px solid var(--green);}
/* Bottoncino PDF sulla card aggregata (singolo contributo) */
.agg-riga-row{display:flex;align-items:center;gap:8px;}
.agg-riga-pdf{background:var(--green-dim);color:var(--green);border:1px solid var(--green);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:Epilogue,sans-serif;white-space:nowrap;}
/* Overlay anteprima PDF */
.report-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:#fff;display:none;flex-direction:column;}
.report-overlay.show{display:flex;}
.report-topbar{background:#1A1612;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rep-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;}
.rep-actions{display:flex;gap:8px;}
.rep-btn{border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Epilogue,sans-serif;}
.rep-btn.close{background:rgba(255,255,255,.15);color:#fff;}
.rep-btn.print{background:#D4511E;color:#fff;}
.report-frame{flex:1;border:none;width:100%;background:#fff;}
/* Riga cantiere nel form (multi-riga) */
.riga-cant{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;margin-bottom:10px;position:relative;}
.riga-cant .rc-num{position:absolute;top:8px;right:10px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;}
.riga-cant .rc-del{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px 8px;}
.btn-add-riga{width:100%;padding:12px;background:transparent;color:var(--brick);border:2px dashed var(--brick);border-radius:var(--r-sm);font-family:Epilogue,sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;}
/* Badge totale ore nel form */
.tot-bar{background:var(--brick-dim);border:1px solid var(--brick);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;color:var(--brick);}
.tot-bar .tot-val{font-family:'Syne',sans-serif;font-size:16px;}
/* Campo nome operaio bloccato (ruolo operaio) */
.op-locked{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:13px 14px;display:flex;align-items:center;gap:10px;}
.op-locked-icon{width:32px;height:32px;background:var(--brick-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--brick);font-weight:700;}
.op-locked-name{font-size:16px;font-weight:600;flex:1;}
.op-locked-hint{font-size:11px;color:var(--muted);margin-top:4px;}
/* Toggle I miei / Tutti (solo admin/capo) */
.filtro-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;}
.filtro-toggle button{flex:1;padding:10px;background:none;border:none;border-radius:7px;font-family:Epilogue,sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.filtro-toggle button.on{background:var(--brick);color:#fff;}
/* Card aggregata (vista Tutti) */
.agg-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.agg-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
.agg-titolo{flex:1;min-width:0;}
.agg-data{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.agg-cant{font-size:12px;color:var(--sand);margin-top:2px;font-weight:500;}
.agg-tot{font-size:13px;font-weight:700;color:var(--brick);background:var(--brick-dim);padding:4px 10px;border-radius:20px;white-space:nowrap;}
.agg-operai{border-top:1px solid var(--border);padding-top:10px;}
.agg-riga{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:6px 0;font-size:13px;}
.agg-riga:not(:last-child){border-bottom:1px dashed var(--border);}
.agg-op-nome{font-weight:600;min-width:110px;}
.agg-op-desc{flex:1;color:var(--muted);font-size:12px;line-height:1.4;}
.agg-op-ore{font-weight:700;color:var(--brick);white-space:nowrap;}
/* Intestazione data (con bottone/i rapportino giornaliero) */
.data-head{margin:18px 4px 8px;display:flex;flex-wrap:wrap;align-items:center;gap:6px;}
.data-head-txt{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-right:6px;}
.data-head-pdf{background:var(--green-dim);color:var(--green);border:1px solid var(--green);border-radius:20px;padding:5px 12px;font-family:Epilogue,sans-serif;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
.data-head-pdf:active{transform:scale(0.97);}
</style>
</head>
<body>

<!-- VISTA LISTA -->
<div id="view-lista" class="view active">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <a href="index.html" style="color:var(--muted);text-decoration:none;font-size:22px">←</a>
      <div class="topbar-title">📝 I miei rapporti</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-top" onclick="forcSync()" title="Sincronizza">🔄</button>
    </div>
  </div>
  <div class="content">
    <div id="filtro-bar" style="display:none;margin-bottom:12px"></div>
    <div id="lista-container"></div>
  </div>
  <div class="bottom-bar">
    <button class="btn-main" onclick="nuovoRapporto()">➕ Nuova giornata</button>
  </div>
</div>

<!-- VISTA FORM -->
<div id="view-form" class="view">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-back" onclick="tornaLista()">←</button>
      <div class="topbar-title" id="form-title">Nuova giornata</div>
    </div>
  </div>
  <div class="content">
    <div class="section">
      <div class="sec-title"><div class="sec-icon">📅</div>Data giornata</div>
      <div class="fg"><input type="date" id="f-data"></div>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-icon">👷</div>Operaio</div>
      <div class="fg" id="operaio-wrap">
        <!-- Renderizzato dinamicamente in base al ruolo -->
      </div>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-icon">🏗️</div>Cantieri lavorati</div>
      <div class="tot-bar">
        <span>Totale ore giornata</span>
        <span class="tot-val" id="tot-ore">0h</span>
      </div>
      <div id="righe-container"></div>
      <button type="button" class="btn-add-riga" onclick="aggiungiRiga()">+ Aggiungi cantiere</button>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="btn-main sec" onclick="tornaLista()">Annulla</button>
    <button class="btn-main green" onclick="salvaRapporto()">✓ Salva</button>
  </div>
</div>

<div class="report-overlay" id="report-overlay">
  <div class="report-topbar">
    <div class="rep-title">📄 Rapporto di Cantiere</div>
    <div class="rep-actions">
      <button class="rep-btn close" onclick="chiudiRapporto()">✕ Chiudi</button>
      <button class="rep-btn print" onclick="stampaRapporto()">🖨️ PDF</button>
    </div>
  </div>
  <iframe id="report-frame" class="report-frame"></iframe>
</div>

<div class="toast" id="toast"></div>

<script>
// ── SUPABASE ──
const SUPA_URL = 'https://iradzlocobsipjazracw.supabase.co';
const SUPA_KEY = 'sb_publishable_zFgRrNrmYSORug8N06heow_6vjl0fhH';
const RPT_KEY = 'rapporti_v1';
const CANT_KEY = 'cantieri_v1';
let db = null;
let currentEditId = null;  // null = nuovo, altrimenti id del record in modifica
let rigaCounter = 0;       // contatore incrementale per le righe del form

function initDB(){ if(window.supabase) db = window.supabase.createClient(SUPA_URL, SUPA_KEY); }

async function dbSalva(k, v){
  if(!db) return;
  try{ await db.from('dati').upsert({chiave:k, valore:v, ts:new Date().toISOString()}, {onConflict:'chiave'}); }catch(e){}
}
async function dbCarica(k){
  if(!db) return null;
  try{
    const {data} = await db.from('dati').select('valore').eq('chiave', k).maybeSingle();
    return data ? data.valore : null;
  }catch(e){ return null; }
}
async function forcSync(){
  toast('🔄 Sincronizzazione...','inf');
  const remoto = await dbCarica(RPT_KEY);
  if(remoto && Array.isArray(remoto)){
    const locale = getRapporti();
    const remIds = new Set(remoto.map(r=>r.id));
    const extra = locale.filter(r=>!remIds.has(r.id));
    salvaRapporti([...remoto, ...extra]);
    renderLista();
  }
  // carica anche cantieri
  const remotiCant = await dbCarica(CANT_KEY);
  if(remotiCant && Array.isArray(remotiCant)){
    localStorage.setItem(CANT_KEY, JSON.stringify(remotiCant));
  }
  toast('✓ Sincronizzato','ok');
}

// ── HELPERS ──
const g = id => document.getElementById(id);
const gv = id => g(id)?.value?.trim() || '';
function toast(msg, tipo){
  const t = g('toast');
  t.textContent = msg;
  t.className = 'toast ' + tipo + ' show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3000);
}
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  g('view-'+name).classList.add('active');
  window.scrollTo(0,0);
}

// ── STORAGE ──
function getRapporti(){
  try{ return JSON.parse(localStorage.getItem(RPT_KEY)) || []; }
  catch{ return []; }
}
function salvaRapporti(l){
  localStorage.setItem(RPT_KEY, JSON.stringify(l));
  dbSalva(RPT_KEY, l);
}
function getCantieri(){
  try{ return JSON.parse(localStorage.getItem(CANT_KEY)) || []; }
  catch{ return []; }
}
function getCantieriAperti(){
  return getCantieri().filter(c => c.stato !== 'Completato');
}
function getCpUser(){
  try{ return JSON.parse(localStorage.getItem('cp_user') || '{}'); }
  catch{ return {}; }
}

// Ritorna true se l'utente loggato è operaio (ruolo limitato)
function isOperaio(){
  const u = getCpUser();
  return (u.ruolo || '').toLowerCase() === 'operaio';
}

// Renderizza il campo "Operaio" in base al ruolo:
// - operaio: card bloccata col proprio nome (non può scegliere)
// - admin/capo/segretaria: dropdown libero con tutti gli operai
function renderCampoOperaio(valoreCorrente){
  const wrap = g('operaio-wrap');
  const cpUser = getCpUser();
  const mioNome = cpUser.nome || '';

  if(isOperaio()){
    // Vista bloccata
    const iniziali = mioNome.split(' ').map(s=>s[0]).slice(0,2).join('').toUpperCase() || '?';
    wrap.innerHTML = `
      <label>Nome operaio</label>
      <div class="op-locked">
        <div class="op-locked-icon">${iniziali}</div>
        <div style="flex:1;min-width:0">
          <div class="op-locked-name">${mioNome || '(nome non impostato)'}</div>
        </div>
        <span style="font-size:16px;color:var(--muted)" title="Solo il tuo nome">🔒</span>
      </div>
      <div class="op-locked-hint">Caricando con il tuo account, il nome è bloccato sul tuo</div>
      <input type="hidden" id="f-operaio" value="${mioNome}">
    `;
  } else {
    // Dropdown libero per capo/admin/segretaria
    wrap.innerHTML = `
      <label>Nome operaio *</label>
      <select id="f-operaio">
        <option value="">-- seleziona --</option>
        <option>Adrian Lup</option>
        <option>Fabio Cardini</option>
        <option>Daniele Schedel</option>
        <option>Michele Poveste</option>
        <option>Vasile Banta</option>
        <option>Andrea Fazi</option>
        <option>Lino Brunozzi</option>
        <option>Rino Lenti</option>
      </select>
      <div class="op-locked-hint">Puoi inserire anche per altri operai</div>
    `;
    // Preseleziono il valore richiesto o il nome dell'utente loggato
    const sel = g('f-operaio');
    const valDesiderato = valoreCorrente || mioNome || '';
    for(const opt of sel.options){
      if(opt.value === valDesiderato){ sel.value = valDesiderato; break; }
    }
  }
}

// ── LISTA ──
// Modalità vista corrente: 'miei' | 'tutti' (solo admin/capo possono usare 'tutti')
let modVista = 'miei';

// Ritorna true se l'utente può vedere la modalità "Tutti i rapporti"
function isPrivilegiato(){
  const r = (getCpUser().ruolo || '').toLowerCase();
  return r === 'admin' || r === 'segretaria' || r === 'capo';
}

function renderToggle(){
  const bar = g('filtro-bar');
  if(!isPrivilegiato()){
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'block';
  bar.innerHTML = `
    <div class="filtro-toggle">
      <button class="${modVista==='miei'?'on':''}" onclick="cambiaVista('miei')">I miei rapporti</button>
      <button class="${modVista==='tutti'?'on':''}" onclick="cambiaVista('tutti')">Tutti i rapporti</button>
    </div>
  `;
}

function cambiaVista(v){
  modVista = v;
  renderToggle();
  renderLista();
}

function renderLista(){
  const el = g('lista-container');
  const tutti = getRapporti();
  const cpUser = getCpUser();
  const email = (cpUser.email || '').toLowerCase();

  // Filtro base: se non sei privilegiato OR modalità "miei", mostra solo i tuoi
  const mostraTutti = isPrivilegiato() && modVista === 'tutti';
  const filtrati = mostraTutti
    ? tutti
    : tutti.filter(r => (r.autore || '').toLowerCase() === email);

  if(!filtrati.length){
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-txt">Nessun rapporto ${mostraTutti?'registrato':'caricato'}</div>
      <div class="empty-sub">${mostraTutti?'Gli operai non hanno ancora caricato nulla':'Premi "➕ Nuova giornata" per iniziare'}</div>
    </div>`;
    return;
  }

  const cantieri = getCantieri();
  const nomeCant = id => {
    const c = cantieri.find(x => x.id === id);
    if(!c) return '— cantiere rimosso —';
    return (c.commessa ? c.commessa + ' · ' : '') + (c.titolo || c.cliente || 'Cantiere');
  };

  if(mostraTutti){
    // Vista AGGREGATA: raggruppa per data + cantiere
    const gruppi = {};
    filtrati.forEach(r => {
      const key = r.data + '|' + r.cantiereId;
      if(!gruppi[key]) gruppi[key] = {data:r.data, cantiereId:r.cantiereId, record:[]};
      gruppi[key].record.push(r);
    });
    // Ordina gruppi per data desc, poi per cantiere
    const arr = Object.values(gruppi).sort((a,b) => b.data.localeCompare(a.data));

    // Raggruppo per data per mostrare intestazioni
    const perData = {};
    arr.forEach(gr => {
      if(!perData[gr.data]) perData[gr.data] = [];
      perData[gr.data].push(gr);
    });
    const date = Object.keys(perData).sort().reverse();

    el.innerHTML = date.map(data => {
      const giorno = new Date(data + 'T12:00:00').toLocaleDateString('it-IT', {day:'2-digit', month:'short', year:'numeric', weekday:'short'});
      // Raccogli tutti gli operai che hanno lavorato quel giorno (su qualsiasi cantiere)
      const operaiDelGiorno = [...new Set(
        perData[data].flatMap(gr => gr.record.map(r => r.operaio)).filter(Boolean)
      )].sort();
      return `
        <div class="data-head">
          <div class="data-head-txt">${giorno}</div>
          ${operaiDelGiorno.map(op => `
            <button class="data-head-pdf" onclick="generaRapportoGiornaliero('${op.replace(/'/g,"\\'")}', '${data}')" title="Rapportino giornaliero di ${op}">
              📥 ${op.split(' ')[0]}
            </button>
          `).join('')}
        </div>
        ${perData[data].map(gr => {
          const totOre = gr.record.reduce((s,r) => s + (parseFloat(r.ore) || 0), 0);
          const operaiRighe = gr.record.map(r => `
            <div class="agg-riga">
              <div class="agg-op-nome">${r.operaio || '—'}</div>
              <div class="agg-op-desc">${r.descrizione || '<span style="opacity:.4">—</span>'}</div>
              <div class="agg-riga-row">
                <div class="agg-op-ore">${r.ore}h</div>
                <button class="agg-riga-pdf" onclick="generaRapportoContributo('${r.id}')" title="Scarica rapportino di questa lavorazione">📥</button>
              </div>
            </div>
          `).join('');
          return `
            <div class="agg-card">
              <div class="agg-head">
                <div class="agg-titolo">
                  <div class="agg-data">${nomeCant(gr.cantiereId)}</div>
                  <div class="agg-cant">${gr.record.length} ${gr.record.length===1?'operaio':'operai'}</div>
                </div>
                <div class="agg-tot">${totOre}h</div>
              </div>
              <div class="agg-operai">${operaiRighe}</div>
            </div>
          `;
        }).join('')}
      `;
    }).join('');
  } else {
    // Vista "I miei": card individuali per ogni record
    const perData = {};
    filtrati.forEach(r => {
      if(!perData[r.data]) perData[r.data] = [];
      perData[r.data].push(r);
    });
    const date = Object.keys(perData).sort().reverse();

    el.innerHTML = date.map(data => {
      const giorno = new Date(data + 'T12:00:00').toLocaleDateString('it-IT', {day:'2-digit', month:'short', year:'numeric', weekday:'short'});
      const record = perData[data];
      const totGiorno = record.reduce((s,r) => s + (parseFloat(r.ore) || 0), 0);
      // L'operaio di questi record (potrebbe essere diverso se admin, ma in "I miei" è sempre il proprio)
      // Raggruppo per operaio (anche se nella vista "I miei" è sempre il caricatore)
      const operaiGiorno = [...new Set(record.map(r => r.operaio).filter(Boolean))];
      return `
        <div class="data-head">
          <div class="data-head-txt">${giorno} · ${totGiorno}h totali</div>
          ${operaiGiorno.map(op => `
            <button class="data-head-pdf" onclick="generaRapportoGiornaliero('${op.replace(/'/g,"\\'")}', '${data}')" title="Rapportino giornaliero di ${op}">
              📥 Rapportino giornaliero${operaiGiorno.length > 1 ? ' · '+op.split(' ')[0] : ''}
            </button>
          `).join('')}
        </div>
        ${record.map(r => `
          <div class="rpt-card">
            <div class="rpt-head">
              <div style="flex:1;min-width:0">
                <div class="rpt-data">${r.operaio || '—'}</div>
                <div class="rpt-cant">${nomeCant(r.cantiereId)}</div>
              </div>
              <div class="rpt-ore">${r.ore}h</div>
            </div>
            ${r.descrizione ? `<div class="rpt-desc">${r.descrizione}</div>` : ''}
            ${r.subappaltatori ? `<div class="rpt-sub">Sub: ${r.subappaltatori}</div>` : ''}
            <div class="rpt-actions">
              <button class="rpt-btn edit" onclick="modificaRapporto('${r.id}')">✏️ Modifica</button>
              <button class="rpt-btn del" onclick="eliminaRapporto('${r.id}')">🗑 Elimina</button>
            </div>
          </div>
        `).join('')}
      `;
    }).join('');
  }
}

function tornaLista(){
  renderToggle();
  showView('lista');
  renderLista();
}

// ── FORM: nuovo / modifica ──
function nuovoRapporto(){
  currentEditId = null;
  g('form-title').textContent = 'Nuova giornata';
  g('f-data').value = new Date().toISOString().split('T')[0];
  renderCampoOperaio();
  // Resetta righe
  g('righe-container').innerHTML = '';
  rigaCounter = 0;
  aggiungiRiga();
  showView('form');
}

function modificaRapporto(id){
  // Lo step 1 tratta ogni record come modifica singola (non riapriamo
  // tutte le righe del giorno: una riga = un rapporto da modificare)
  const r = getRapporti().find(x => x.id === id);
  if(!r){ toast('Rapporto non trovato','err'); return; }
  currentEditId = id;
  g('form-title').textContent = 'Modifica rapporto';
  g('f-data').value = r.data;
  renderCampoOperaio(r.operaio);
  g('righe-container').innerHTML = '';
  rigaCounter = 0;
  aggiungiRiga({cantiereId:r.cantiereId, ore:r.ore, descrizione:r.descrizione, subappaltatori:r.subappaltatori});
  showView('form');
}

function eliminaRapporto(id){
  if(!confirm('Confermi eliminazione del rapporto?')) return;
  const lista = getRapporti().filter(r => r.id !== id);
  salvaRapporti(lista);
  renderLista();
  toast('Eliminato','inf');
}

// ── FORM: righe multi-cantiere ──
function aggiungiRiga(preset){
  rigaCounter++;
  const n = rigaCounter;
  const cantieri = getCantieriAperti();
  const opts = cantieri.map(c => {
    const label = (c.commessa ? c.commessa + ' · ' : '') + (c.titolo || c.cliente || 'Cantiere');
    return `<option value="${c.id}">${label}</option>`;
  }).join('');

  const inEdit = !!preset;
  const div = document.createElement('div');
  div.className = 'riga-cant';
  div.id = 'riga-' + n;
  div.innerHTML = `
    ${!inEdit ? `<button type="button" class="rc-del" onclick="rimuoviRiga(${n})" title="Rimuovi">✕</button>` : ''}
    <div class="rc-num">RIGA ${n}</div>
    <div class="fg" style="margin-top:16px">
      <label>Cantiere *</label>
      <select id="rc-cant-${n}" onchange="aggiornaTotale()">
        <option value="">-- seleziona --</option>
        ${opts}
      </select>
    </div>
    <div class="fg">
      <label>Ore lavorate *</label>
      <input type="number" step="0.5" min="0" max="24" id="rc-ore-${n}" placeholder="Es. 8" oninput="aggiornaTotale()">
    </div>
    <div class="fg">
      <label>Descrizione lavori</label>
      <textarea id="rc-desc-${n}" placeholder="Cosa hai fatto oggi..."></textarea>
    </div>
    <div class="fg">
      <label>Subappaltatori (opzionale)</label>
      <input type="text" id="rc-sub-${n}" placeholder="Es. Ditta Rossi">
    </div>
  `;
  g('righe-container').appendChild(div);

  if(preset){
    g('rc-cant-'+n).value = preset.cantiereId || '';
    g('rc-ore-'+n).value = preset.ore || '';
    g('rc-desc-'+n).value = preset.descrizione || '';
    g('rc-sub-'+n).value = preset.subappaltatori || '';
  }
  aggiornaTotale();
}

function rimuoviRiga(n){
  const el = g('riga-'+n);
  if(!el) return;
  // Non permetto di eliminare se è l'unica riga
  const tot = document.querySelectorAll('.riga-cant').length;
  if(tot <= 1){ toast('Deve esserci almeno una riga','err'); return; }
  el.remove();
  aggiornaTotale();
}

function aggiornaTotale(){
  let tot = 0;
  document.querySelectorAll('[id^="rc-ore-"]').forEach(inp => {
    const v = parseFloat(inp.value);
    if(!isNaN(v)) tot += v;
  });
  g('tot-ore').textContent = tot + 'h';
}

function raccogliRighe(){
  // Legge tutte le righe visibili nel form e restituisce un array di oggetti
  const out = [];
  document.querySelectorAll('.riga-cant').forEach(div => {
    const n = div.id.replace('riga-', '');
    const cant = g('rc-cant-'+n)?.value || '';
    const ore = parseFloat(g('rc-ore-'+n)?.value || 0);
    const desc = g('rc-desc-'+n)?.value?.trim() || '';
    const sub = g('rc-sub-'+n)?.value?.trim() || '';
    if(cant || ore > 0 || desc) out.push({cantiereId:cant, ore, descrizione:desc, subappaltatori:sub});
  });
  return out;
}

// ── SALVA ──
function salvaRapporto(){
  const data = gv('f-data');
  const operaio = gv('f-operaio');
  if(!data){ toast('Seleziona la data','err'); return; }
  if(!operaio){ toast('Seleziona l\'operaio','err'); return; }

  const righe = raccogliRighe();
  if(!righe.length){ toast('Aggiungi almeno una riga','err'); return; }

  // Validazione righe
  for(let i=0; i<righe.length; i++){
    const r = righe[i];
    if(!r.cantiereId){ toast(`Riga ${i+1}: seleziona un cantiere`,'err'); return; }
    if(!r.ore || r.ore <= 0){ toast(`Riga ${i+1}: inserisci le ore`,'err'); return; }
  }

  const cpUser = getCpUser();
  const autore = (cpUser.email || '').toLowerCase();
  const now = new Date().toISOString();

  let lista = getRapporti();

  if(currentEditId){
    // Modifica: aggiorno il record esistente (prendo solo la prima riga in caso di modifica)
    const idx = lista.findIndex(r => r.id === currentEditId);
    if(idx < 0){ toast('Record non trovato','err'); return; }
    const r0 = righe[0];
    lista[idx] = {
      ...lista[idx],
      data, operaio,
      cantiereId: r0.cantiereId,
      ore: r0.ore,
      descrizione: r0.descrizione,
      subappaltatori: r0.subappaltatori,
      timestamp: now
    };
  } else {
    // Nuovo: creo N record, uno per riga
    righe.forEach((r, i) => {
      lista.push({
        id: 'rpt_' + Date.now() + '_' + i,
        cantiereId: r.cantiereId,
        data, operaio,
        operaioEmail: autore,
        ore: r.ore,
        descrizione: r.descrizione,
        subappaltatori: r.subappaltatori,
        tipo: 'operaio',
        autore,
        timestamp: now
      });
    });
  }

  salvaRapporti(lista);
  toast(currentEditId ? '✓ Rapporto aggiornato' : `✓ Salvate ${righe.length} righe`, 'ok');
  setTimeout(() => tornaLista(), 600);
}

// Ritorna true se l'utente può scaricare il rapportino dell'operaio indicato
function puoScaricareRapporto(record){
  if(!record) return false;
  if(isPrivilegiato()) return true; // admin/capo/segretaria: sempre ok
  const cpUser = getCpUser();
  const emailUtente = (cpUser.email || '').toLowerCase();
  const nomeUtente = cpUser.nome || '';
  // Operaio: può scaricare solo i record dove lui è l'operaio O dove è l'autore
  if((record.autore || '').toLowerCase() === emailUtente) return true;
  if((record.operaio || '') === nomeUtente) return true;
  return false;
}

// Costruisce l'HTML del PDF dato un set di lavorazioni (righe operai) + dati comuni.
// Parametri:
//   operai: array di {nome, ore, desc, commessa} (1..8)
//   subs: array di stringhe subappaltatori (0..5)
//   dataFmt: 'DD/MM/YYYY'
//   nomeCantiere: stringa in intestazione CANTIERE (vuota per rapportino giornaliero)
//   firma: nome da mostrare nel box FIRMA
//   totOre: totale ore da mostrare in riga "Totale ore"
//   commTot: commessa da mostrare nell'ultima cella (usare '' se multi-commessa)
function renderPDFHtml({operai, subs, dataFmt, nomeCantiere, firma, totOre, commTot}){
  // Righe operai: sempre 8 slot, compilo secondo operai[]
  let opRows = '';
  for(let i = 0; i < 8; i++){
    const op = operai[i];
    opRows += `<tr>
      <td class="cell cell-name">${op ? (op.nome || '&nbsp;') : '&nbsp;'}</td>
      <td class="cell cell-ore">${op ? op.ore : '&nbsp;'}</td>
      <td class="cell cell-desc">${op ? (op.desc || '&nbsp;') : '&nbsp;'}</td>
      <td class="cell cell-comm">${op ? (op.commessa || '&nbsp;') : '&nbsp;'}</td>
    </tr>`;
  }
  // Righe subappaltatori: sempre 5 slot
  let subRows = '';
  for(let i = 0; i < 5; i++){
    const s = (subs && subs[i]) || '';
    subRows += `<tr>
      <td class="cell cell-name">${s || '&nbsp;'}</td>
      <td class="cell cell-ore">&nbsp;</td>
      <td class="cell cell-desc">&nbsp;</td>
      <td class="cell cell-comm">&nbsp;</td>
    </tr>`;
  }
  return `<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8">
<title>Rapporto di Cantiere — ${dataFmt}</title>
<style>
  @page { size: A4 landscape; margin: 1.2cm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Aptos Narrow', 'Arial Narrow', Arial, sans-serif; font-size: 12pt; color: #000; background: #fff; padding: 10px; }
  .report { width: 100%; max-width: 27cm; margin: 0 auto; }
  table.rpt { width: 100%; border-collapse: collapse; table-layout: fixed; }
  table.rpt td { border: 1px solid #000; padding: 4px 6px; vertical-align: middle; font-size: 12pt; font-family: 'Aptos Narrow','Arial Narrow',Arial,sans-serif; height: 22px; }
  .logo-cell { width: 31%; height: 50px; padding: 4px 8px !important; text-align: left; vertical-align: middle; }
  .logo-cell img { max-height: 38px; max-width: 100%; object-fit: contain; }
  .title-cell { width: 69%; font-weight: bold; text-align: center; font-size: 14pt; }
  .lbl { font-weight: bold; width: 8%; white-space: nowrap; }
  .val-cant { width: 46%; }
  .lbl-data { font-weight: bold; width: 7%; white-space: nowrap; }
  .val-data { width: 39%; }
  .hdr { font-weight: bold; background: #fafafa; }
  .cell-name { width: 31%; }
  .cell-ore { width: 8%; text-align: center; }
  .cell-desc { width: 46%; }
  .cell-comm { width: 15%; }
  .sub-hdr { font-weight: bold; background: #fafafa; }
  .tot-lbl { font-weight: bold; }
  .tot-val { font-weight: bold; text-align: center; }
  .firma-wrap { margin-top: 8px; display: flex; justify-content: flex-end; }
  .firma-box { width: 22%; border: 1px solid #000; }
  .firma-top { text-align: center; padding: 4px; border-bottom: 1px solid #000; height: 24px; font-weight: bold; }
  .firma-bot { height: 50px; padding: 4px; text-align: center; font-size: 11pt; }
  @media print {
    body { padding: 0; }
    .report { max-width: none; }
  }
</style>
</head><body>
<div class="report">
  <table class="rpt">
    <tr>
      <td class="logo-cell"><img src="${LOGO_PIERANTONI}" alt="Pierantoni"></td>
      <td class="title-cell" colspan="3">RAPPORTO DI CANTIERE</td>
    </tr>
    <tr>
      <td class="lbl">CANTIERE</td>
      <td class="val-cant">${nomeCantiere || '&nbsp;'}</td>
      <td class="lbl-data">Data:</td>
      <td class="val-data">${dataFmt}</td>
    </tr>
    <tr class="hdr">
      <td class="cell-name">Operai interni</td>
      <td class="cell-ore">Ore</td>
      <td class="cell-desc">Descrizione Lavori Eseguiti</td>
      <td class="cell-comm">Commessa</td>
    </tr>
    ${opRows}
    <tr class="sub-hdr">
      <td class="cell-name">Subappaltatori</td>
      <td class="cell-ore">&nbsp;</td>
      <td class="cell-desc">&nbsp;</td>
      <td class="cell-comm">&nbsp;</td>
    </tr>
    ${subRows}
    <tr>
      <td class="tot-lbl">Totale ore</td>
      <td class="tot-val">${totOre}</td>
      <td class="cell-desc">&nbsp;</td>
      <td class="cell-comm">${commTot || '&nbsp;'}</td>
    </tr>
  </table>
  <div class="firma-wrap">
    <div class="firma-box">
      <div class="firma-top">FIRMA</div>
      <div class="firma-bot">${firma || '&nbsp;'}</div>
    </div>
  </div>
</div>
</body></html>`;
}

// Mostra il PDF HTML nell'overlay e imposta il nome file suggerito
function mostraPDFOverlay(html, filename){
  const frame = g('report-frame');
  const overlay = g('report-overlay');
  overlay.classList.add('show');
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open(); doc.write(html); doc.close();
  frame._filename = filename;
}

// ── Rapportino SINGOLO CONTRIBUTO (una lavorazione) ──
// Usato dalla vista "Tutti" e dal diario cantiere per il download singolo
function generaRapportoContributo(id){
  const record = getRapporti().find(r => r.id === id);
  if(!record){ toast('Record non trovato','err'); return; }
  if(!puoScaricareRapporto(record)){
    toast('⛔ Non puoi scaricare il rapportino di un altro operaio','err');
    return;
  }
  const cant = getCantieri().find(c => c.id === record.cantiereId);
  if(!cant){ toast('Cantiere non trovato','err'); return; }

  const dataFmt = new Date(record.data + 'T12:00:00').toLocaleDateString('it-IT');
  const commessa = cant.commessa || '';
  const nomeCantiere = commessa
    ? commessa + ' — ' + (cant.titolo || cant.cliente || '')
    : (cant.titolo || cant.cliente || '');
  const subs = record.subappaltatori
    ? record.subappaltatori.split(',').map(s => s.trim()).filter(Boolean)
    : [];

  const html = renderPDFHtml({
    operai: [{nome: record.operaio, ore: record.ore, desc: record.descrizione || '', commessa}],
    subs,
    dataFmt,
    nomeCantiere,
    firma: (record.operaio || '').toUpperCase(),
    totOre: record.ore,
    commTot: commessa
  });

  const clean = s => (s || '').replace(/[^a-zA-Z0-9_-]/g, '_');
  const dataStr = dataFmt.replace(/\//g, '-');
  const filename = `Rapporto_${clean(record.operaio)}_${clean(commessa || 'cantiere')}_${dataStr}`;
  mostraPDFOverlay(html, filename);
}

// ── Rapportino GIORNALIERO dell'operaio ──
// Aggrega tutte le lavorazioni di un operaio in una data su più cantieri
function generaRapportoGiornaliero(operaio, data){
  const tutti = getRapporti().filter(r =>
    r.operaio === operaio && r.data === data
  );
  if(!tutti.length){ toast('Nessuna lavorazione per quella giornata','err'); return; }

  // Permesso: se sono operaio, posso farlo solo per me stesso
  if(!isPrivilegiato()){
    const cpUser = getCpUser();
    const mioNome = cpUser.nome || '';
    if(operaio !== mioNome){
      toast('⛔ Non puoi scaricare il rapportino di un altro operaio','err');
      return;
    }
  }

  const cantieri = getCantieri();
  const dataFmt = new Date(data + 'T12:00:00').toLocaleDateString('it-IT');

  // Una riga per ogni lavorazione: Adrian/4h/P0066 - Adrian/4h/P0067 ...
  const operai = tutti.map(r => {
    const cant = cantieri.find(c => c.id === r.cantiereId);
    const commessa = cant ? (cant.commessa || '') : '';
    return {
      nome: r.operaio,
      ore: r.ore,
      desc: r.descrizione || '',
      commessa
    };
  });

  // Subappaltatori unici da tutte le lavorazioni
  const subsSet = new Set();
  tutti.forEach(r => {
    if(r.subappaltatori){
      r.subappaltatori.split(',').map(s => s.trim()).filter(Boolean).forEach(s => subsSet.add(s));
    }
  });
  const subs = [...subsSet];

  // Totale ore
  const totOre = tutti.reduce((s, r) => s + (parseFloat(r.ore) || 0), 0);

  // CANTIERE in alto: vuoto (scelta utente: ogni lavorazione ha la sua commessa nella tabella)
  const html = renderPDFHtml({
    operai,
    subs,
    dataFmt,
    nomeCantiere: '',
    firma: (operaio || '').toUpperCase(),
    totOre,
    commTot: '' // multi-commessa, lascio vuoto
  });

  const clean = s => (s || '').replace(/[^a-zA-Z0-9_-]/g, '_');
  const dataStr = dataFmt.replace(/\//g, '-');
  const filename = `Rapporto_${clean(operaio)}_Giornaliero_${dataStr}`;
  mostraPDFOverlay(html, filename);
}

function chiudiRapporto(){
  g('report-overlay').classList.remove('show');
}

function stampaRapporto(){
  const frame = g('report-frame');
  if(!frame) return;
  try{
    const doc = frame.contentDocument || frame.contentWindow.document;
    if(frame._filename) doc.title = frame._filename;
  }catch(e){}
  frame.contentWindow.focus();
  frame.contentWindow.print();
}

// Permette di aprire rapportini da link esterno:
//   rapporto.html?pdf=ID_RECORD   → rapportino singolo contributo
//   rapporto.html?daily=NOME&date=YYYY-MM-DD  → rapportino giornaliero
(function apriDaQuery(){
  const qs = new URLSearchParams(window.location.search);
  const pdfId = qs.get('pdf');
  const daily = qs.get('daily');
  const date = qs.get('date');
  if(pdfId){
    setTimeout(() => generaRapportoContributo(pdfId), 300);
  } else if(daily && date){
    setTimeout(() => generaRapportoGiornaliero(daily, date), 300);
  }
})();

renderToggle();
