<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CommessaPro">
<meta name="theme-color" id="theme-color-meta" content="#FFFFFF">
<link rel="icon" href="logo-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>CommessaPro · Accedi</title>
<link id="font-link" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#FFFFFF;--surface:#F5F5F5;--surface2:#EBEBEB;
  --brick:#D4511E;--brick-dim:rgba(212,81,30,0.12);
  --sand:#8A6A50;--sand-dim:rgba(138,106,80,0.12);
  --white:#1A1612;--muted:#888280;--border:rgba(0,0,0,0.1);
  --green:#3A7A4C;--green-dim:rgba(58,122,76,0.12);
  --r:14px;--r-sm:10px;
  --font-head:'Syne',sans-serif;--font-body:'Epilogue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  font-family:var(--font-body);background:var(--bg);color:var(--white);
  min-height:100vh;transition:background .2s,color .2s;
  display:flex;flex-direction:column;
}

/* ── LAYOUT ── */
.login-wrap{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px 48px;
  min-height:100vh;
}

/* ── LOGO ── */
.logo-area{text-align:center;margin-bottom:40px;}
.logo-icon{
  width:72px;height:72px;border-radius:20px;
  background:var(--brick);display:inline-flex;
  align-items:center;justify-content:center;
  margin-bottom:16px;
  box-shadow:0 8px 32px var(--brick-dim);
}
.logo-icon svg{width:40px;height:40px;fill:#fff;}
.logo{font-family:var(--font-head);font-size:28px;font-weight:800;color:var(--white);line-height:1;}
.logo span{color:var(--brick);}
.logo-sub{font-size:13px;color:var(--muted);margin-top:6px;}

/* ── CARD ── */
.login-card{
  width:100%;max-width:380px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px 24px;
}
.card-title{
  font-family:var(--font-head);font-size:18px;font-weight:700;
  margin-bottom:6px;
}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:24px;}

/* ── FORM ── */
.field{margin-bottom:16px;}
.field-label{
  font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;display:block;
}
.field-input{
  width:100%;padding:13px 14px;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:var(--r-sm);
  font-family:var(--font-body);font-size:15px;
  color:var(--white);outline:none;
  transition:border-color .2s;
  -webkit-appearance:none;
}
.field-input:focus{border-color:var(--brick);}
.field-input::placeholder{color:var(--muted);}

/* Password wrapper */
.pw-wrap{position:relative;}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  font-size:18px;color:var(--muted);padding:4px;
  line-height:1;
}

/* ── BUTTON ── */
.btn-login{
  width:100%;padding:14px;margin-top:8px;
  background:var(--brick);color:#fff;
  border:none;border-radius:var(--r-sm);
  font-family:var(--font-head);font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.3px;
  transition:opacity .2s,transform .1s;
  -webkit-user-select:none;
}
.btn-login:active{opacity:.85;transform:scale(0.99);}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── ERROR / STATUS ── */
.msg{
  margin-top:14px;padding:11px 14px;
  border-radius:var(--r-sm);font-size:13px;
  display:none;
}
.msg.error{background:rgba(200,64,64,0.1);color:#C84040;border:1px solid rgba(200,64,64,0.2);display:block;}
.msg.success{background:var(--green-dim);color:var(--green);border:1px solid rgba(58,122,76,0.2);display:block;}

/* ── SPINNER ── */
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.4);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:6px;
}

/* ── FOOTER ── */
.login-footer{
  text-align:center;font-size:11px;color:var(--muted);
  margin-top:28px;opacity:.6;
}
</style>
</head>
<body>

<div class="login-wrap">

  <!-- LOGO -->
  <div class="logo-area">
    <div class="logo-icon">
      <!-- Hard-hat / builder icon -->
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 4C13.4 4 8 9.4 8 16v1h4v-1c0-4.4 3.6-8 8-8s8 3.6 8 8v1h4v-1c0-6.6-5.4-12-12-12z"/>
        <rect x="5" y="17" width="30" height="5" rx="2.5"/>
        <rect x="10" y="25" width="20" height="9" rx="2"/>
      </svg>
    </div>
    <div class="logo">Commessa<span>Pro</span></div>
    <div class="logo-sub">Gestione cantieri e commesse</div>
  </div>

  <!-- CARD -->
  <div class="login-card">
    <div class="card-title">Accedi</div>
    <div class="card-sub">Inserisci le tue credenziali per continuare</div>

    <form id="login-form" onsubmit="handleLogin(event)" novalidate>
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="field-input"
          placeholder="nome@azienda.it"
          autocomplete="email"
          inputmode="email"
          required
        >
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="pw-wrap">
          <input
            id="password"
            type="password"
            class="field-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <button type="button" class="pw-toggle" id="pw-toggle" onclick="togglePw()" aria-label="Mostra password">👁</button>
        </div>
      </div>

      <button class="btn-login" id="btn-login" type="submit">Accedi</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <div class="login-footer">CommessaPro · v1.0</div>
</div>

<script>
const SUPA_URL = 'https://iradzlocobsipjazracw.supabase.co';
const SUPA_KEY = 'sb_publishable_zFgRrNrmYSORug8N06heow_6vjl0fhH';
const SETTINGS_KEY = 'cp_settings';
const USER_KEY = 'cp_user';

const db = window.supabase.createClient(SUPA_URL, SUPA_KEY);

// ── THEME ──
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

const FONTS = {
  syne: {
    head: "'Syne',sans-serif", body: "'Epilogue',sans-serif",
    url: 'https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@400;500&display=swap'
  },
  inter: {
    head: "'Inter',sans-serif", body: "'Inter',sans-serif",
    url: 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap'
  },
};

function getSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {tema:'bianco',font:'syne',colore:'#D4511E'}; }
  catch { return {tema:'bianco',font:'syne',colore:'#D4511E'}; }
}

function applicaSettings(s) {
  const root = document.documentElement;
  if (s.tema === 'nero') {
    root.style.setProperty('--bg','#0F0D0A');
    root.style.setProperty('--surface','#1A1714');
    root.style.setProperty('--surface2','#242018');
    root.style.setProperty('--white','#F5F0E8');
    root.style.setProperty('--muted','#6B6258');
    root.style.setProperty('--border','rgba(200,184,154,0.12)');
    document.getElementById('theme-color-meta').content = '#0F0D0A';
  } else {
    root.style.setProperty('--bg','#FFFFFF');
    root.style.setProperty('--surface','#F5F5F5');
    root.style.setProperty('--surface2','#EBEBEB');
    root.style.setProperty('--white','#1A1612');
    root.style.setProperty('--muted','#888280');
    root.style.setProperty('--border','rgba(0,0,0,0.1)');
    document.getElementById('theme-color-meta').content = '#FFFFFF';
  }
  const col = s.colore || '#D4511E';
  root.style.setProperty('--brick', col);
  root.style.setProperty('--brick-dim', `rgba(${hexToRgb(col)},0.12)`);
  const f = FONTS[s.font] || FONTS.syne;
  root.style.setProperty('--font-head', f.head);
  root.style.setProperty('--font-body', f.body);
  document.body.style.fontFamily = f.body;
  const link = document.getElementById('font-link');
  if (link && link.href !== f.url) link.href = f.url;
}

applicaSettings(getSettings());

// If already logged in, go straight to app
(function checkSession() {
  const u = localStorage.getItem(USER_KEY);
  if (u) { try { const p = JSON.parse(u); if (p && p.email) { window.location.replace('index.html'); return; } } catch {} }
})();

// ── PASSWORD TOGGLE ──
function togglePw() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('pw-toggle');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

// ── UI HELPERS ──
function setMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + (type || '');
  if (!type) el.style.display = 'none';
}

function setLoading(on) {
  const btn = document.getElementById('btn-login');
  btn.disabled = on;
  btn.innerHTML = on
    ? '<span class="spinner"></span>Accesso in corso…'
    : 'Accedi';
  document.getElementById('email').disabled = on;
  document.getElementById('password').disabled = on;
}

// ── LOGIN ──
async function handleLogin(e) {
  e.preventDefault();
  setMsg('');

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    setMsg('Inserisci email e password.', 'error');
    return;
  }

  setLoading(true);

  try {
    // 1. Authenticate with Supabase Auth
    const { data: authData, error: authError } = await db.auth.signInWithPassword({ email, password });

    if (authError) {
      const errMap = {
        'Invalid login credentials': 'Email o password non corretti.',
        'Email not confirmed': 'Conferma la tua email prima di accedere.',
        'Too many requests': 'Troppi tentativi. Riprova tra qualche minuto.',
      };
      setMsg(errMap[authError.message] || authError.message, 'error');
      setLoading(false);
      return;
    }

    // 2. Fetch user profile from 'utenti' table
    const userEmail = authData.user.email;
    const { data: profile, error: profileError } = await db
      .from('utenti')
      .select('nome, ruolo, attivo, permessi')
      .eq('email', userEmail)
      .maybeSingle();

    let nome = '';
    let ruolo = 'operatore';
    let permessi = null;

    if (!profileError && profile) {
      nome = profile.nome || '';
      ruolo = profile.ruolo || 'operatore';
      permessi = (['segretaria','admin'].includes(ruolo)) ? {} : (profile.permessi || null);
      if (profile.attivo === false) {
        setMsg('Account disattivato. Contatta l\'amministratore.', 'error');
        setLoading(false);
        await db.auth.signOut();
        return;
      }
    }

    // 3. Persist user to localStorage
    const cpUser = { email: userEmail, nome, ruolo, permessi };
    localStorage.setItem(USER_KEY, JSON.stringify(cpUser));

    setMsg('Accesso effettuato. Reindirizzamento…', 'success');

    // 4. Redirect
    setTimeout(() => { window.location.replace('index.html'); }, 600);

  } catch (err) {
    setMsg('Errore di rete. Controlla la connessione.', 'error');
    setLoading(false);
  }
}
</script>
</body>
</html>
