<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CommessaPro">
<meta name="theme-color" content="#0F0D0A">
<link rel="icon" href="logo-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>SAL</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Epilogue:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#FFFFFF;--surface:#F5F5F5;--surface2:#EBEBEB;--brick:#D4511E;--brick-dim:rgba(212,81,30,0.12);--sand:#8A6A50;--sand-dim:rgba(138,106,80,0.12);--white:#1A1612;--muted:#888280;--border:rgba(0,0,0,0.1);--green:#3A7A4C;--green-dim:rgba(58,122,76,0.12);--r:14px;--r-sm:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Epilogue',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}
.view{display:none;}.view.active{display:block;}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.btn-back{color:var(--muted);background:none;border:none;cursor:pointer;font-size:22px;padding:0;}
.btn-top{background:var(--sand-dim);color:var(--sand);border:none;border-radius:8px;padding:7px 12px;font-family:Epilogue,sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.content{padding:16px 16px 120px;}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;}
.sec-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sand);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-icon{width:28px;height:28px;background:var(--brick-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.fg{margin-bottom:12px;}.fg:last-child{margin-bottom:0;}
label{display:block;font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
input,textarea,select{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--white);font-family:'Epilogue',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
input:focus,textarea:focus{border-color:var(--brick);}
input::placeholder,textarea::placeholder{color:var(--muted);}
input[type="file"]{display:none;}
.foto-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.foto-btn{padding:12px;background:var(--surface2);border:1.5px dashed var(--border);border-radius:var(--r-sm);text-align:center;cursor:pointer;}
.foto-btn:active{border-color:var(--brick);}
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.foto-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;}
.foto-item img{width:100%;height:100%;object-fit:cover;display:block;}
.foto-del{position:absolute;top:3px;right:3px;width:22px;height:22px;background:rgba(0,0,0,.75);color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.foto-num{position:absolute;bottom:3px;left:5px;font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);}
.cant-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;}
.cant-card:active{border-color:var(--brick);}
.cant-icon{width:44px;height:44px;background:var(--brick-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cant-info{flex:1;min-width:0;}
.cant-nome{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cant-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.sal-entry{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:12px;overflow:hidden;}
.sal-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.sal-data{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.sal-perc{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--green-dim);color:var(--green);}
.sal-desc{padding:0 16px 14px;font-size:13px;line-height:1.6;color:rgba(245,240,232,.8);}
.sal-foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 16px 14px;}
.sal-foto-item{border-radius:6px;overflow:hidden;aspect-ratio:1;}
.sal-foto-item img{width:100%;height:100%;object-fit:cover;display:block;}
.sal-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px;}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-txt{font-size:15px;font-weight:500;color:var(--sand);margin-bottom:6px;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.toast{position:fixed;top:70px;left:16px;right:16px;padding:14px 16px;border-radius:var(--r-sm);font-size:14px;font-weight:500;text-align:center;z-index:999;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{background:var(--green);color:#fff;}
.toast.err{background:#C8441A;color:#fff;}
.toast.inf{background:var(--surface2);color:var(--white);border:1px solid var(--border);}
</style>
</head>
<body>

<div id="view-lista" class="view active">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <a href="index.html" style="color:var(--muted);text-decoration:none;font-size:22px">←</a>
      <div class="topbar-title">📸 S.A.L.</div>
    </div>
    <button class="btn-top" onclick="forcSync()" title="Sincronizza">🔄</button>
  </div>
  <div class="content" style="padding-bottom:40px">
    <div style="font-size:12px;color:var(--muted);padding:4px 4px 14px">Storico fotografico avanzamento lavori per cantiere.</div>
    <div id="lista-cantieri"></div>
  </div>
</div>

<div id="view-sal" class="view">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-back" onclick="tornaLista()">←</button>
      <div class="topbar-title" id="sal-title">SAL</div>
    </div>
    <div style="display:flex;gap:6px"><button class="btn-top" onclick="esportaSAL()">📤 Esporta</button><button class="btn-top" onclick="mostraForm()">+ Nuovo</button></div>
  </div>
  <div class="content">
    <div id="sal-form" style="display:none">
      <div class="section">
        <div class="sec-title"><div class="sec-icon">📝</div>Nuovo aggiornamento</div>
        <div class="fg"><label>Data</label><input type="date" id="sal-data"></div>
        <div class="fg"><label>Avanzamento %</label><input type="number" id="sal-perc" placeholder="Es. 30" min="0" max="100"></div>
        <div class="fg"><label>Descrizione lavori svolti</label>
          <textarea id="sal-desc" placeholder="Descrivi cosa è stato fatto..."></textarea>
        </div>
        <div class="divider"></div>
        <div class="foto-btns">
          <div class="foto-btn" onclick="document.getElementById('sal-cam').click()">
            <div style="font-size:20px;margin-bottom:4px">📷</div>
            <div style="font-size:12px;font-weight:500;color:var(--sand)">Scatta foto</div>
          </div>
          <div class="foto-btn" onclick="document.getElementById('sal-lib').click()">
            <div style="font-size:20px;margin-bottom:4px">🖼️</div>
            <div style="font-size:12px;font-weight:500;color:var(--sand)">Dalla libreria</div>
          </div>
        </div>
        <input type="file" id="sal-cam" accept="image/*" capture="environment" multiple onchange="caricaFotoForm(this)">
        <input type="file" id="sal-lib" accept="image/*" multiple onchange="caricaFotoForm(this)">
        <div class="foto-grid" id="sal-foto-preview" style="margin-bottom:14px"></div>
        <div style="display:flex;gap:8px">
          <button onclick="nascondiForm()" style="flex:1;padding:14px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:var(--r-sm);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer">Annulla</button>
          <button onclick="salvaEntrata()" style="flex:2;padding:14px;background:var(--brick);color:#fff;border:none;border-radius:var(--r-sm);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer">✓ Salva SAL</button>
        </div>
      </div>
    </div>
    <div id="sal-storico"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── SUPABASE ──
const SUPA_URL='https://iradzlocobsipjazracw.supabase.co';
const SUPA_KEY='sb_publishable_zFgRrNrmYSORug8N06heow_6vjl0fhH';
const CANT_KEY='cantieri_v1';
let db=null;
function initDB(){if(window.supabase)db=window.supabase.createClient(SUPA_URL,SUPA_KEY);}
async function dbSalva(k,v){if(!db)return;try{await db.from('dati').upsert({chiave:k,valore:v,ts:new Date().toISOString()},{onConflict:'chiave'});}catch(e){}}
async function forcSync(){
  toast('🔄 Sincronizzazione...','inf');
  if(!db)return;
  try{
    const {data}=await db.from('dati').select('valore').eq('chiave',CANT_KEY).maybeSingle();
    if(data&&data.valore&&data.valore.length>0){
      const loc=getCantieri(),ids=new Set(data.valore.map(x=>x.id)),ex=loc.filter(x=>!ids.has(x.id));
      salvaCantieri([...data.valore,...ex]); renderLista();
    }
    toast('✓ Sincronizzato','ok');
  }catch(e){toast('Sync ok','inf');}
}

let currentCantId=null, fotoForm=[];
const g=id=>document.getElementById(id);
const gv=id=>g(id)?.value?.trim()||'';
function toast(msg,tipo){const t=g('toast');t.textContent=msg;t.className='toast '+tipo+' show';clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);}
function getCantieri(){try{return JSON.parse(localStorage.getItem(CANT_KEY))||[];}catch{return[];}}
function salvaCantieri(l){localStorage.setItem(CANT_KEY,JSON.stringify(l));dbSalva(CANT_KEY,l);}
function showView(n){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));g('view-'+n).classList.add('active');window.scrollTo(0,0);}

function renderLista(){
  const lista=getCantieri();const el=g('lista-cantieri');
  if(!lista.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">📸</div><div class="empty-txt">Nessun cantiere</div><div style="font-size:13px;color:var(--muted)">Avvia un cantiere dalla scheda Sopralluogo</div></div>`;return;}
  el.innerHTML=lista.map(c=>{
    const n=(c.sal||[]).length;
    return `<div class="cant-card" onclick="apriSAL('${c.id}')">
      <div class="cant-icon">📸</div>
      <div class="cant-info"><div class="cant-nome">${c.cliente||'—'}</div><div class="cant-meta">${c.indirizzo||'—'} · ${n} aggiornament${n===1?'o':'i'}</div></div>
      <span style="font-size:20px;color:var(--muted)">→</span>
    </div>`;}).join('');
}

function apriSAL(id){
  currentCantId=id;const c=getCantieri().find(x=>x.id===id);if(!c)return;
  g('sal-title').textContent=c.cliente||'SAL';g('sal-form').style.display='none';
  fotoForm=[];renderStorico(c);showView('sal');
}
function tornaLista(){showView('lista');renderLista();}

function mostraForm(){
  g('sal-form').style.display='block';
  g('sal-data').value=new Date().toISOString().split('T')[0];
  g('sal-perc').value='';g('sal-desc').value='';
  fotoForm=[];renderFotoForm();
  g('sal-form').scrollIntoView({behavior:'smooth'});
}
function nascondiForm(){g('sal-form').style.display='none';fotoForm=[];}

function caricaFotoForm(input){
  [...input.files].forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=600;let w=img.width,h=img.height;
        if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
        canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
        fotoForm.push(canvas.toDataURL('image/jpeg',0.65));renderFotoForm();
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  });input.value='';
}
function renderFotoForm(){
  const el=g('sal-foto-preview');if(!fotoForm.length){el.innerHTML='';return;}
  el.innerHTML=fotoForm.map((url,i)=>`<div class="foto-item"><img src="${url}"><button class="foto-del" onclick="delFotoForm(${i})">✕</button><span class="foto-num">${i+1}</span></div>`).join('');
}
function delFotoForm(i){fotoForm.splice(i,1);renderFotoForm();}

function salvaEntrata(){
  const desc=gv('sal-desc');if(!desc){toast('Inserisci una descrizione','err');return;}
  const lista=getCantieri();const idx=lista.findIndex(c=>c.id===currentCantId);if(idx<0)return;
  if(!lista[idx].sal)lista[idx].sal=[];
  lista[idx].sal.unshift({id:'sal_'+Date.now(),data:gv('sal-data')||new Date().toISOString().split('T')[0],perc:gv('sal-perc'),desc,foto:[...fotoForm]});
  salvaCantieri(lista);g('sal-form').style.display='none';fotoForm=[];
  renderStorico(lista[idx]);toast('✅ SAL salvato','ok');
}

function renderStorico(c){
  const el=g('sal-storico');const sal=c.sal||[];
  if(!sal.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">📷</div><div class="empty-txt">Nessun aggiornamento</div><div style="font-size:13px;color:var(--muted)">Premi "+ Nuovo" per aggiungere il primo SAL</div></div>`;return;}
  el.innerHTML=sal.map((s,i)=>{
    const d=new Date(s.data).toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'});
    const fotoHtml=s.foto&&s.foto.length?`<div class="sal-foto-grid">${s.foto.map(url=>`<div class="sal-foto-item"><img src="${url}"></div>`).join('')}</div>`:'';
    return `<div class="sal-entry">
      <div class="sal-header">
        <div><div class="sal-data">${d}</div>${s.foto&&s.foto.length?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${s.foto.length} foto</div>`:''}</div>
        <div style="display:flex;align-items:center;gap:8px">
          ${s.perc?`<span class="sal-perc">${s.perc}%</span>`:''}
          <button class="sal-del" onclick="delSAL('${c.id}',${i})">🗑</button>
        </div>
      </div>
      <div class="sal-desc">${s.desc}</div>
      ${fotoHtml}
    </div>`;
  }).join('');
}

function delSAL(cantId,i){
  if(!confirm('Eliminare questo aggiornamento?'))return;
  const lista=getCantieri();const idx=lista.findIndex(c=>c.id===cantId);if(idx<0)return;
  lista[idx].sal.splice(i,1);salvaCantieri(lista);renderStorico(lista[idx]);toast('Eliminato','ok');
}


// ── ESPORTA SAL ──
function esportaSAL(){
  const lista = getCantieri();
  const c = lista.find(x=>x.id===currentCantId);
  if(!c) return;
  const sal = c.sal||[];
  if(!sal.length){ toast('Nessun aggiornamento da esportare','err'); return; }

  const MESI=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const fotoRows = sal.map((s,i)=>{
    const d = new Date(s.data).toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'});
    const fotoHtml = (s.foto||[]).length ? `
      <table style="width:100%;border-collapse:separate;border-spacing:6px 6px;margin-top:8px">
        <tr>${(s.foto||[]).map((url,fi)=>`
          <td style="vertical-align:top;padding:0;width:50%">
            <div style="font-size:8px;color:#9C9088;margin-bottom:3px">Foto ${fi+1}</div>
            <img src="${url}" style="width:100%;height:160px;object-fit:cover;border-radius:6px;border:1px solid #E8E2D9;display:block">
          </td>`).join('')}
        </tr>
      </table>` : '';
    return `
      <div style="margin-bottom:24px;page-break-inside:avoid;border-left:3px solid #D4511E;padding-left:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div style="font-weight:700;font-size:15px;color:#0F0D0A">${d}</div>
          ${s.perc?`<span style="background:#E8F5E9;color:#3A7A4C;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px">${s.perc}%</span>`:''}
        </div>
        <div style="font-size:13px;line-height:1.7;color:#333;margin-bottom:6px">${s.desc}</div>
        ${fotoHtml}
      </div>`;
  }).join('');

  const oggi = new Date().toLocaleDateString('it-IT');
  const html = `<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8">
<title>SAL — ${c.titolo||c.cliente}</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;background:#fff;color:#1A1612;padding:24px;max-width:680px;margin:0 auto;}
.hdr{border-bottom:3px solid #D4511E;padding-bottom:14px;margin-bottom:24px;}
.ttl{font-size:22px;font-weight:700;}.sub{font-size:13px;color:#9C9088;margin-top:4px;}
@media print{body{padding:0;}.print-btn{display:none;}}
.print-btn{position:fixed;bottom:16px;right:16px;background:#D4511E;color:#fff;border:none;padding:13px 20px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(212,81,30,.4);}
</style></head><body>
<div class="hdr">
  <div class="ttl">S.A.L. — ${c.titolo||c.cliente||'—'}</div>
  <div class="sub">${c.cliente||''} · ${c.indirizzo||''} · Esportato il ${oggi}</div>
</div>
${fotoRows}
<button class="print-btn" onclick="window.print()">🖨️ Salva PDF</button>
</body></html>`;

  const frame = document.createElement('iframe');
  frame.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;background:#fff';
  document.body.appendChild(frame);
  const doc = frame.contentDocument||frame.contentWindow.document;
  doc.open(); doc.write(html); doc.close();

  // Add close button
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕ Chiudi';
  closeBtn.style.cssText = 'position:fixed;top:16px;left:16px;z-index:10000;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer';
  closeBtn.onclick = ()=>{ document.body.removeChild(frame); document.body.removeChild(closeBtn); };
  document.body.appendChild(closeBtn);
}

// ── INIT ──
initDB();renderLista();
setTimeout(()=>forcSync().catch(()=>{}),500);
</script>
</body>
</html>
