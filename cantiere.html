<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CommessaPro">
<meta name="theme-color" content="#0F0D0A">
<link rel="icon" href="logo-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Cantiere</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Epilogue:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#FFFFFF;--surface:#F5F5F5;--surface2:#EBEBEB;--brick:#D4511E;--brick-dim:rgba(212,81,30,0.12);--sand:#8A6A50;--sand-dim:rgba(138,106,80,0.12);--white:#1A1612;--muted:#888280;--border:rgba(0,0,0,0.1);--green:#3A7A4C;--green-dim:rgba(58,122,76,0.12);--r:14px;--r-sm:10px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Epilogue',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}
.view{display:none;}.view.active{display:block;}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.btn-back{color:var(--muted);background:none;border:none;cursor:pointer;font-size:22px;padding:0;}
.btn-top{background:var(--sand-dim);color:var(--sand);border:none;border-radius:8px;padding:7px 12px;font-family:Epilogue,sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.content{padding:16px 16px 120px;}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;}
.sec-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sand);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-icon{width:28px;height:28px;background:var(--brick-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-lbl{color:var(--muted);}.info-val{font-weight:500;text-align:right;}
.fg{margin-bottom:12px;}.fg:last-child{margin-bottom:0;}
label{display:block;font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
input,textarea,select{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--white);font-family:'Epilogue',sans-serif;font-size:16px;outline:none;-webkit-appearance:none;}
input:focus,textarea:focus{border-color:var(--brick);}
input::placeholder,textarea::placeholder{color:var(--muted);}
select option{background:#1A1714;}
textarea{resize:none;min-height:80px;line-height:1.6;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.op-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.op-chip{padding:9px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;-webkit-user-select:none;}
.op-chip.on{background:var(--brick-dim);border-color:var(--brick);}
.giornata-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px;margin-bottom:10px;}
.g-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.g-data{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.g-ore{font-size:12px;color:var(--muted);margin-top:2px;}
.g-operai{font-size:12px;color:var(--sand);margin-bottom:4px;}
.g-note{font-size:13px;line-height:1.5;}
.g-del{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 70%,transparent);z-index:100;}
.btn-main{width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-appearance:none;}
.btn-main:active{transform:scale(.98);}
.toast{position:fixed;top:70px;left:16px;right:16px;padding:14px 16px;border-radius:var(--r-sm);font-size:14px;font-weight:500;text-align:center;z-index:999;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{background:var(--green);color:#fff;}
.toast.err{background:#C8441A;color:#fff;}
.toast.inf{background:var(--surface2);color:var(--white);border:1px solid var(--border);}
.cant-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;}
.cant-card:active{border-color:var(--brick);}
.cant-icon{width:44px;height:44px;background:var(--green-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.cant-info{flex:1;min-width:0;}
.cant-nome{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cant-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-txt{font-size:15px;font-weight:500;color:var(--sand);margin-bottom:6px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<div id="view-lista" class="view active">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <a href="index.html" style="color:var(--muted);text-decoration:none;font-size:22px">←</a>
      <div class="topbar-title">🏗️ Cantieri</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-top" onclick="forcSync()" title="Sincronizza">🔄</button>
      <button class="btn-top" onclick="document.getElementById('cant-import').click()">📥 Ripristina</button>
    </div>
  </div>
  <input type="file" id="cant-import" accept=".json" style="display:none" onchange="importaCantieri(this)">
  <div class="content" style="padding-bottom:40px">
    <div style="font-size:12px;color:var(--muted);padding:4px 4px 14px">I cantieri si avviano dalla scheda Sopralluogo.</div>
    <div id="lista-container"></div>
  </div>
</div>

<div id="view-dettaglio" class="view">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-back" onclick="tornaLista()">←</button>
      <div class="topbar-title" id="det-title">Cantiere</div>
    </div>
    <span id="det-stato" style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--green-dim);color:var(--green)">In corso</span>
  </div>
  <div class="content">
    <div class="section">
      <div class="sec-title"><div class="sec-icon">📍</div>Dati cantiere</div>
      <div id="det-info"></div>
    </div>
    <div class="section" style="padding:14px 18px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;color:var(--muted)">Tariffa oraria operai</span>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="tariffa" value="22" min="1" max="999" step="0.5"
            style="width:80px;padding:8px 10px;text-align:right;font-size:15px;font-weight:600"
            oninput="salvaTariffa()">
          <span style="font-size:13px;color:var(--muted)">€/h</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title"><div class="sec-icon">📅</div>Registra giornata</div>
      <div class="row2" style="margin-bottom:10px">
        <div class="fg"><label>Data</label><input type="date" id="g-data"></div>
        <div class="fg"><label>Ore / operaio</label><input type="number" id="g-ore" placeholder="8" min="0.5" max="24" step="0.5"></div>
      </div>
      <div class="fg"><label>Operai presenti</label><div class="op-grid" id="operai-chips"></div></div>
      <div class="fg" style="margin-top:10px"><label>Lavori svolti oggi</label>
        <textarea id="g-note" placeholder="Descrivi brevemente cosa è stato fatto..."></textarea>
      </div>
      <div class="fg" style="margin-top:10px"><label>Subappaltatori (opzionale)</label>
        <input type="text" id="g-sub" placeholder="Es. Idraulico Mario, Elettricista Rossi...">
      </div>
      <button onclick="aggiungiGiornata()" style="width:100%;padding:14px;background:var(--brick);color:#fff;border:none;border-radius:var(--r-sm);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px">+ Salva giornata</button>
    </div>
    <div class="section">
      <div class="sec-title"><div class="sec-icon">📋</div>Diario lavori
        <span id="tot-giorni" style="margin-left:auto;font-size:12px;color:var(--muted);font-family:Epilogue,sans-serif;text-transform:none;letter-spacing:0;font-weight:400"></span>
      </div>
      <div id="diario-list"></div>
    </div>
  </div>
  <div class="bottom-bar">
    <button class="btn-main" onclick="chiudiCantiere()">✓ Chiudi Cantiere</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── SUPABASE ──
const SUPA_URL='https://iradzlocobsipjazracw.supabase.co';
const SUPA_KEY='sb_publishable_zFgRrNrmYSORug8N06heow_6vjl0fhH';
const CANT_KEY='cantieri_v1';
const OPERAI=['Adrian Lup','Fabio Cardini','Daniele Schedel','Michele Poveste','Vasile Banta'];
let db=null, currentCant=null, operaiSel=[];

function initDB(){if(window.supabase)db=window.supabase.createClient(SUPA_URL,SUPA_KEY);}
async function dbSalva(k,v){if(!db)return;try{await db.from('dati').upsert({chiave:k,valore:v,ts:new Date().toISOString()},{onConflict:'chiave'});}catch(e){}}
async function forcSync(){
  toast('🔄 Sincronizzazione...','inf');
  if(!db){toast('Nessuna connessione','err');return;}
  try{
    const {data}=await db.from('dati').select('valore').eq('chiave',CANT_KEY).maybeSingle();
    if(data&&data.valore&&data.valore.length>0){
      const loc=getCantieri(),ids=new Set(data.valore.map(x=>x.id)),ex=loc.filter(x=>!ids.has(x.id));
      salvaCantieri([...data.valore,...ex]); renderLista();
    }
    toast('✓ Sincronizzato','ok');
  }catch(e){toast('Errore sync','err');}
}

const g=id=>document.getElementById(id);
const gv=id=>g(id)?.value?.trim()||'';
function toast(msg,tipo){const t=g('toast');t.textContent=msg;t.className='toast '+tipo+' show';clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);}
function getCantieri(){try{return JSON.parse(localStorage.getItem(CANT_KEY))||[];}catch{return[];}}
function salvaCantieri(l){localStorage.setItem(CANT_KEY,JSON.stringify(l));dbSalva(CANT_KEY,l);}
function showView(n){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));g('view-'+n).classList.add('active');window.scrollTo(0,0);}

function eliminaCantiere(id){
  if(!confirm('Eliminare questo cantiere?')) return;
  // Rimuovi il cantiereId dal sopralluogo collegato
  const cant = getCantieri().find(c=>c.id===id);
  if(cant&&cant.sopralluogoId){
    const sops = JSON.parse(localStorage.getItem('sopralluoghi_v3')||'[]');
    const sopIdx = sops.findIndex(s=>s.id===cant.sopralluogoId);
    if(sopIdx>=0){ sops[sopIdx].cantiereId=null; localStorage.setItem('sopralluoghi_v3',JSON.stringify(sops)); dbSalva('sopralluoghi_v3',sops); }
  }
  salvaCantieri(getCantieri().filter(c=>c.id!==id)); renderLista(); toast('Eliminato','inf');
}

function renderLista(){
  const lista=getCantieri();const el=g('lista-container');
  if(!lista.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">🏗️</div><div class="empty-txt">Nessun cantiere</div><div style="font-size:13px;color:var(--muted)">Avvia un cantiere dalla scheda Sopralluogo</div></div>`;return;}
  el.innerHTML=lista.map(c=>`
    <div class="cant-card" onclick="apriCantiere('${c.id}')">
      <div class="cant-icon">🏗️</div>
      <div class="cant-info"><div class="cant-nome">${c.commessa?c.commessa+' — ':''} ${c.titolo||c.cliente||'—'}</div><div class="cant-meta">${c.cliente||'—'} · ${c.stato||'In corso'} · Dal ${c.dataInizio||'—'}</div></div>
      <button style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;" onclick="event.stopPropagation();eliminaCantiere('${c.id}')">🗑</button>
    </div>`).join('');
}

function apriCantiere(id){
  const c=getCantieri().find(x=>x.id===id);if(!c)return;
  currentCant=c;g('det-title').textContent=(c.commessa?c.commessa+' — ':'')+' '+(c.titolo||c.cliente||'Cantiere');
  const stato=c.stato||'In corso';
  g('det-stato').textContent=stato;g('det-stato').style.background=stato==='Completato'?'rgba(200,184,154,.1)':'var(--green-dim)';g('det-stato').style.color=stato==='Completato'?'var(--muted)':'var(--green)';
  g('det-info').innerHTML=`${c.commessa?`<div class="info-row"><span class="info-lbl">Commessa</span><span class="info-val" style="color:var(--brick);font-weight:700">${c.commessa}</span></div>`:''} ${c.titolo?`<div class="info-row"><span class="info-lbl">Lavoro</span><span class="info-val" style="color:var(--sand);font-weight:600">${c.titolo}</span></div>`:''}<div class="info-row"><span class="info-lbl">Cliente</span><span class="info-val">${c.cliente||'—'}</span></div><div class="info-row"><span class="info-lbl">Indirizzo</span><span class="info-val">${c.indirizzo||'—'}</span></div><div class="info-row"><span class="info-lbl">Responsabile</span><span class="info-val">${c.resp||'—'}</span></div><div class="info-row"><span class="info-lbl">Data inizio</span><span class="info-val">${c.dataInizio||'—'}</span></div><div class="info-row"><span class="info-lbl">Superficie</span><span class="info-val">${c.mq?c.mq+' mq':'—'}</span></div>`;
  g('g-data').value=new Date().toISOString().split('T')[0];g('g-ore').value='8';g('g-note').value='';
  const tarEl=document.getElementById('tariffa');if(tarEl)tarEl.value=c.tariffa||22;
  operaiSel=[];renderChips();renderDiario();showView('dettaglio');
}

function tornaLista(){showView('lista');renderLista();}
function salvaCantiere(){const l=getCantieri();const i=l.findIndex(c=>c.id===currentCant.id);if(i>=0)l[i]=currentCant;salvaCantieri(l);}

function renderChips(){
  g('operai-chips').innerHTML=OPERAI.map(op=>`<div class="op-chip ${operaiSel.includes(op)?'on':''}" onclick="toggleOp('${op}',this)">${op.split(' ')[0]}</div>`).join('');
}
function toggleOp(nome,el){const i=operaiSel.indexOf(nome);if(i>=0)operaiSel.splice(i,1);else operaiSel.push(nome);el.classList.toggle('on');}

function aggiungiGiornata(){
  if(!operaiSel.length){toast('Seleziona almeno un operaio','err');return;}
  const ore=parseFloat(gv('g-ore'))||8;
  if(!currentCant.giornate)currentCant.giornate=[];
  currentCant.giornate.push({data:gv('g-data')||new Date().toISOString().split('T')[0],operai:[...operaiSel],ore,note:gv('g-note'),sub:gv('g-sub')});
  salvaCantiere();g('g-note').value='';g('g-sub').value='';operaiSel=[];renderChips();renderDiario();toast('✓ Giornata salvata','ok');
}

function renderDiario(){
  const el=g('diario-list');const gg=currentCant.giornate||[];
  g('tot-giorni').textContent=gg.length+(gg.length===1?' giornata':' giornate');
  if(!gg.length){el.innerHTML='<div style="font-size:13px;color:var(--muted);padding:4px 0">Nessuna giornata registrata</div>';return;}
  el.innerHTML=[...gg].reverse().map((g2,ri)=>{
    const i=gg.length-1-ri;
    const d=new Date(g2.data).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});
    return `<div class="giornata-card"><div class="g-header"><div><div class="g-data">${d}</div><div class="g-ore">${g2.ore}h × ${g2.operai.length} op. = ${g2.ore*g2.operai.length}h totali</div></div><div style="display:flex;gap:6px"><button onclick="scaricaRapporto(${i})" style="background:var(--green-dim);color:var(--green);border:1px solid var(--green);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer">📥 Rapporto</button><button class="g-del" onclick="delGiornata(${i})">🗑</button></div></div><div class="g-operai">${g2.operai.map(o=>o.split(' ')[0]).join(', ')}</div>${g2.note?`<div class="g-note">${g2.note}</div>`:''}</div>`;
  }).join('');
}

function delGiornata(i){if(!confirm('Eliminare questa giornata?'))return;currentCant.giornate.splice(i,1);salvaCantiere();renderDiario();}

function chiudiCantiere(){
  if(!confirm('Chiudere il cantiere?'))return;
  currentCant.stato='Completato';currentCant.dataFine=new Date().toISOString().split('T')[0];
  salvaCantiere();g('det-stato').textContent='Completato';g('det-stato').style.background='rgba(200,184,154,.1)';g('det-stato').style.color='var(--muted)';toast('Cantiere chiuso','ok');
}

function importaCantieri(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);if(!d.cantieri&&!d.sopralluoghi)throw new Error('File non valido');
      if(d.cantieri&&d.cantieri.length>0){const ce=getCantieri();const ci=new Set(ce.map(c=>c.id));const nc=d.cantieri.filter(c=>!ci.has(c.id));const ac=ce.map(c=>{const b=d.cantieri.find(x=>x.id===c.id);return b||c;});salvaCantieri([...nc,...ac]);}
      renderLista();toast(`✅ Ripristinati ${(d.cantieri||[]).length} cantieri`,'ok');
    }catch(e){toast('Errore: '+e.message,'err');}
  };
  reader.readAsText(file);input.value='';
}

// ── TARIFFA ──
function salvaTariffa(){
  const val = parseFloat(document.getElementById('tariffa')?.value)||22;
  currentCant.tariffa = val;
  salvaCantiere();
  dbSalva('cantieri_v1', getCantieri());
}

function scaricaRapporto(idx){
  const g2 = currentCant.giornate[idx];
  if(!g2){ toast('Giornata non trovata','err'); return; }
  const XLSX = window.XLSX;
  if(!XLSX){ toast('Libreria Excel non caricata','err'); return; }

  // Carica template originale da base64
  const wb = XLSX.read(TEMPLATE_B64, {type:'base64'});
  const ws = wb.Sheets[wb.SheetNames[0]];

  const dataFmt = new Date(g2.data+'T12:00:00').toLocaleDateString('it-IT');
  const commessa = currentCant.commessa||'';
  const nomeXls = currentCant.commessa ? currentCant.commessa+' — '+(currentCant.titolo||currentCant.cliente||'') : (currentCant.titolo||currentCant.cliente||'');

  // Riempi cantiere e data
  if(ws['D5']) ws['D5'].v = nomeXls; else ws['D5'] = {t:'s', v:nomeXls};
  if(ws['K5']) ws['K5'].v = dataFmt; else ws['K5'] = {t:'s', v:dataFmt};

  // Righe operai (7-13, max 7)
  for(let i=0;i<7;i++){
    const row = 7+i;
    const op = (g2.operai||[])[i]||'';
    const ore = op ? g2.ore : '';
    const desc = (i===0) ? (g2.note||'') : '';
    const comm = op ? commessa : '';

    const setCell = (addr, val) => {
      if(ws[addr]) ws[addr].v = val;
      else if(val) ws[addr] = {t: typeof val==='number'?'n':'s', v:val};
    };
    setCell(`C${row}`, op);
    setCell(`G${row}`, ore);
    setCell(`H${row}`, desc);
    setCell(`N${row}`, comm);
  }

  // Subappaltatori (righe 16-20, max 5 — la 15 è il header)
  const subs = g2.sub ? g2.sub.split(',').map(s=>s.trim()).filter(Boolean) : [];
  for(let i=0;i<5;i++){
    const row = 16+i;
    const val = subs[i]||'';
    if(ws[`C${row}`]) ws[`C${row}`].v = val;
    else if(val) ws[`C${row}`] = {t:'s', v:val};
  }

  // Totale ore
  const totOre = (g2.operai||[]).length * g2.ore;
  if(ws['H21']) ws['H21'].v = totOre; else ws['H21'] = {t:'n', v:totOre};
  if(ws['N21']) ws['N21'].v = commessa; else ws['N21'] = {t:'s', v:commessa};

  const dataStr = dataFmt.replace(/\//g,'-');
  XLSX.writeFile(wb, `Rapporto_${commessa}_${dataStr}.xlsx`);
  toast('📥 Rapporto scaricato!','ok');
}

// Migrazione: popola titolo dai sopralluoghi collegati
(function migraTitoli(){
  const cantieri = getCantieri();
  const sops = JSON.parse(localStorage.getItem('sopralluoghi_v3')||'[]');
  let changed = false;
  cantieri.forEach(cant=>{
    if(!cant.titolo && cant.sopralluogoId){
      const sop = sops.find(s=>s.id===cant.sopralluogoId);
      if(sop&&sop.titolo){ cant.titolo=sop.titolo; changed=true; }
    }
  });
  if(changed){ localStorage.setItem('cantieri_v1',JSON.stringify(cantieri)); dbSalva('cantieri_v1',cantieri); }
})();
