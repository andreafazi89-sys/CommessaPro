<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CommessaPro">
<meta name="theme-color" content="#FFFFFF">
<link rel="icon" href="logo-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>CommessaPro</title>
<link id="font-link" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#FFFFFF;--surface:#F5F5F5;--surface2:#EBEBEB;--brick:#D4511E;--brick-dim:rgba(212,81,30,0.12);--sand:#8A6A50;--sand-dim:rgba(138,106,80,0.12);--white:#1A1612;--muted:#888280;--border:rgba(0,0,0,0.1);--green:#3A7A4C;--green-dim:rgba(58,122,76,0.12);--r:14px;--r-sm:10px;--font-head:'Syne',sans-serif;--font-body:'Epilogue',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:var(--font-body);background:var(--bg);color:var(--white);min-height:100vh;transition:background .2s,color .2s;}
.header{padding:32px 24px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:var(--font-head);font-size:26px;font-weight:800;color:var(--white);}
.logo span{color:var(--brick);}
.settings-btn{width:40px;height:40px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;-webkit-user-select:none;}
.logout-btn{width:40px;height:40px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;-webkit-user-select:none;color:var(--muted);}
.readonly-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;background:var(--brick-dim);color:var(--brick);border-radius:4px;padding:2px 5px;vertical-align:middle;margin-left:5px;}
.greeting{font-size:12px;color:var(--muted);padding:0 24px 16px;}
.riep-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;}
.stat-val{font-family:var(--font-head);font-size:22px;font-weight:700;margin-bottom:2px;}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.stat-val.pos{color:var(--green);}
.stat-val.neg{color:#C84040;}
.divider{height:1px;background:var(--border);margin:4px 16px 16px;}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:0 20px;margin-bottom:10px;}
.tools{padding:0 16px;display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.tool-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;text-decoration:none;color:var(--white);}
.tool-card:active{background:var(--surface2);}
.tool-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.tool-info{flex:1;}
.tool-name{font-family:var(--font-head);font-size:15px;font-weight:700;margin-bottom:2px;}
.tool-desc{font-size:11px;color:var(--muted);}
.tool-arrow{color:var(--brick);font-size:18px;}
.footer{text-align:center;font-size:11px;color:var(--border);padding:8px 16px 24px;}

/* SETTINGS PANEL */
.settings-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:500;display:none;}
.settings-overlay.show{display:block;}
.settings-panel{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 20px 40px;z-index:501;transform:translateY(100%);transition:transform .3s ease;}
.settings-panel.show{transform:translateY(0);}
.settings-title{font-family:var(--font-head);font-size:17px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
.settings-close{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;padding:0;}
.setting-row{margin-bottom:20px;}
.setting-lbl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.toggle-group{display:flex;gap:8px;}
.toggle-opt{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:10px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--muted);-webkit-user-select:none;}
.toggle-opt.active{border-color:var(--brick);background:var(--brick-dim);color:var(--white);}
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.color-opt{width:100%;aspect-ratio:1;border-radius:10px;cursor:pointer;border:3px solid transparent;-webkit-user-select:none;}
.color-opt.active{border-color:var(--white);box-shadow:0 0 0 2px var(--brick);}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">Commessa<span>Pro</span></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="logout-btn" onclick="logout()" title="Esci">⏏</div>
    <div class="settings-btn" onclick="apriSettings()">⚙️</div>
  </div>
</div>
<div class="greeting" id="greeting">Caricamento…</div>

<!-- RIEPILOGO -->
<div class="riep-grid">
  <div class="stat-box"><div class="stat-val" id="st-sopralluoghi">—</div><div class="stat-lbl">Sopralluoghi totali</div></div>
  <div class="stat-box"><div class="stat-val" id="st-cantieri">—</div><div class="stat-lbl">Cantieri aperti</div></div>
  <div class="stat-box"><div class="stat-val" id="st-ore">—</div><div class="stat-lbl">Ore questa settimana</div></div>
  <div class="stat-box"><div class="stat-val pos" id="st-margine">—</div><div class="stat-lbl">Margine del mese</div></div>
</div>

<div class="divider"></div>
<div class="section-label">Strumenti</div>

<div class="tools" id="tools-list"></div>

<div class="footer">CommessaPro · v1.0</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="s-overlay" onclick="chiudiSettings()"></div>
<div class="settings-panel" id="s-panel">
  <div class="settings-title">
    Impostazioni
    <button class="settings-close" onclick="chiudiSettings()">✕</button>
  </div>

  <div class="setting-row">
    <div class="setting-lbl">Sfondo app</div>
    <div class="toggle-group">
      <div class="toggle-opt" id="opt-bianco" onclick="setTema('bianco')">☀️ Bianco</div>
      <div class="toggle-opt" id="opt-nero" onclick="setTema('nero')">🌙 Scuro</div>
    </div>
  </div>

  <div class="setting-row">
    <div class="setting-lbl">Font</div>
    <div class="toggle-group">
      <div class="toggle-opt" id="opt-font-syne" onclick="setFont('syne')" style="font-family:'Syne',sans-serif">Syne</div>
      <div class="toggle-opt" id="opt-font-inter" onclick="setFont('inter')" style="font-family:'Inter',sans-serif">Inter</div>
    </div>
  </div>

  <div class="setting-row">
    <div class="setting-lbl">Colore accent (report e dettagli)</div>
    <div class="color-grid" id="color-grid"></div>
  </div>

  <div style="font-size:11px;color:var(--muted);margin-top:4px">Le impostazioni si applicano a tutta l'app.</div>
</div>

<script>
// ── AUTH ──
const USER_KEY='cp_user';
function getUser(){try{return JSON.parse(localStorage.getItem(USER_KEY))||null;}catch{return null;}}
(function(){const u=getUser();if(!u||!u.email)window.location.replace('login.html');})();
function logout(){localStorage.removeItem(USER_KEY);window.location.replace('login.html');}

const SUPA_URL='https://iradzlocobsipjazracw.supabase.co';
const SUPA_KEY='sb_publishable_zFgRrNrmYSORug8N06heow_6vjl0fhH';
const SETTINGS_KEY='cp_settings';
let db=null;
function initDB(){if(window.supabase)db=window.supabase.createClient(SUPA_URL,SUPA_KEY);}

// ── TOOLS PER RUOLO ──
const ALL_TOOLS=[
  {href:'sopralluogo.html',icon:'🔍',bg:'rgba(212,81,30,0.15)',name:'Sopralluogo',desc:'Scheda cliente, foto, note, report PDF',roles:['admin','segretaria','operaio'],readonly:['segretaria','operaio']},
  {href:'cantiere.html',icon:'🏗️',bg:'rgba(58,122,76,0.15)',name:'Cantiere',desc:'Diario operai e ore lavorate',roles:['admin','operaio']},
  {href:'sal.html',icon:'📸',bg:'rgba(74,120,180,0.15)',name:'S.A.L.',desc:'Storico fotografico avanzamento lavori',roles:['admin','operaio']},
  {href:'contabilita.html',icon:'📊',bg:'rgba(58,122,76,0.15)',name:'Contabilità',desc:'Preventivi, costi e margini',roles:['admin','segretaria']},
  {href:'note.html',icon:'📝',bg:'rgba(212,81,30,0.12)',name:'Note & Agenda',desc:'Attività giornaliere per mese',roles:['admin','segretaria']},
  {href:'rubrica.html',icon:'👥',bg:'rgba(58,122,76,0.12)',name:'Rubrica Clienti',desc:'Anagrafica nome, telefono, email',roles:['admin','segretaria']},
];
function renderTools(){
  const ruolo=(getUser()?.ruolo||'operatore').toLowerCase();
  const isAdmin=ruolo==='admin';
  const list=document.getElementById('tools-list');
  list.innerHTML=ALL_TOOLS
    .filter(t=>isAdmin||t.roles.includes(ruolo))
    .map(t=>{
      const ro=!isAdmin&&t.readonly&&t.readonly.includes(ruolo);
      return `<a href="${t.href}" class="tool-card">
        <div class="tool-icon" style="background:${t.bg}">${t.icon}</div>
        <div class="tool-info">
          <div class="tool-name">${t.name}${ro?'<span class="readonly-badge">sola lettura</span>':''}</div>
          <div class="tool-desc">${t.desc}</div>
        </div>
        <div class="tool-arrow">→</div>
      </a>`;
    }).join('');
}

// ── SETTINGS ──
const COLORS=[
  {name:'Arancio',val:'#D4511E'},
  {name:'Blu',val:'#2563EB'},
  {name:'Verde',val:'#16A34A'},
  {name:'Viola',val:'#7C3AED'},
  {name:'Rosso',val:'#DC2626'},
  {name:'Teal',val:'#0D9488'},
  {name:'Oro',val:'#B45309'},
  {name:'Rosa',val:'#DB2777'},
  {name:'Grigio',val:'#4B5563'},
  {name:'Nero',val:'#111827'},
];

const FONTS={
  syne:{head:"'Syne',sans-serif",body:"'Epilogue',sans-serif",url:'https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@400;500&display=swap'},
  inter:{head:"'Inter',sans-serif",body:"'Inter',sans-serif",url:'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap'},
};

function getSettings(){
  try{return JSON.parse(localStorage.getItem(SETTINGS_KEY))||{tema:'bianco',font:'syne',colore:'#D4511E'};}
  catch{return {tema:'bianco',font:'syne',colore:'#D4511E'};}
}
function saveSettings(s){localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));}

function applicaSettings(s){
  const root=document.documentElement;
  // Tema
  if(s.tema==='nero'){
    root.style.setProperty('--bg','#0F0D0A');
    root.style.setProperty('--surface','#1A1714');
    root.style.setProperty('--surface2','#242018');
    root.style.setProperty('--white','#F5F0E8');
    root.style.setProperty('--muted','#6B6258');
    root.style.setProperty('--border','rgba(200,184,154,0.12)');
    document.querySelector('meta[name=theme-color]').content='#0F0D0A';
  } else {
    root.style.setProperty('--bg','#FFFFFF');
    root.style.setProperty('--surface','#F5F5F5');
    root.style.setProperty('--surface2','#EBEBEB');
    root.style.setProperty('--white','#1A1612');
    root.style.setProperty('--muted','#888280');
    root.style.setProperty('--border','rgba(0,0,0,0.1)');
    document.querySelector('meta[name=theme-color]').content='#FFFFFF';
  }
  // Colore accent
  root.style.setProperty('--brick', s.colore||'#D4511E');
  const rgb=hexToRgb(s.colore||'#D4511E');
  root.style.setProperty('--brick-dim',`rgba(${rgb},0.12)`);
  // Font
  const f=FONTS[s.font]||FONTS.syne;
  root.style.setProperty('--font-head',f.head);
  root.style.setProperty('--font-body',f.body);
  document.body.style.fontFamily=f.body;
  const link=document.getElementById('font-link');
  if(link&&link.href!==f.url) link.href=f.url;
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function apriSettings(){
  const s=getSettings();
  // Toggle states
  document.getElementById('opt-bianco').classList.toggle('active',s.tema==='bianco');
  document.getElementById('opt-nero').classList.toggle('active',s.tema==='nero');
  document.getElementById('opt-font-syne').classList.toggle('active',s.font==='syne');
  document.getElementById('opt-font-inter').classList.toggle('active',s.font==='inter');
  // Color grid
  const grid=document.getElementById('color-grid');
  grid.innerHTML=COLORS.map(col=>`
    <div class="color-opt ${s.colore===col.val?'active':''}" 
      style="background:${col.val}" 
      onclick="setColore('${col.val}')" 
      title="${col.name}"></div>`).join('');
  document.getElementById('s-overlay').classList.add('show');
  document.getElementById('s-panel').classList.add('show');
}

function chiudiSettings(){
  document.getElementById('s-overlay').classList.remove('show');
  document.getElementById('s-panel').classList.remove('show');
}

function setTema(t){
  const s=getSettings(); s.tema=t; saveSettings(s); applicaSettings(s);
  document.getElementById('opt-bianco').classList.toggle('active',t==='bianco');
  document.getElementById('opt-nero').classList.toggle('active',t==='nero');
}

function setFont(f){
  const s=getSettings(); s.font=f; saveSettings(s); applicaSettings(s);
  document.getElementById('opt-font-syne').classList.toggle('active',f==='syne');
  document.getElementById('opt-font-inter').classList.toggle('active',f==='inter');
}

function setColore(val){
  const s=getSettings(); s.colore=val; saveSettings(s); applicaSettings(s);
  document.querySelectorAll('.color-opt').forEach(el=>{
    el.classList.toggle('active',el.style.background===val||el.getAttribute('onclick').includes(val));
  });
}

// ── RIEPILOGO ──
function getCantieri(){try{return JSON.parse(localStorage.getItem('cantieri_v1'))||[];}catch{return[];}}
function getSopralluoghi(){try{return JSON.parse(localStorage.getItem('sopralluoghi_v3'))||[];}catch{return[];}}

function aggiornaRiepilogo(){
  const cantieri=getCantieri(), sops=getSopralluoghi(), oggi=new Date();
  const ora=oggi.getHours();
  const nomeUtente=getUser()?.nome||getUser()?.email?.split('@')[0]||'';
  document.getElementById('greeting').textContent=(ora<12?'Buongiorno':ora<18?'Buon pomeriggio':'Buonasera')+(nomeUtente?', '+nomeUtente:'')+' 👋';
  document.getElementById('st-sopralluoghi').textContent=sops.length;
  document.getElementById('st-cantieri').textContent=cantieri.filter(c=>c.stato!=='Completato').length;
  const lunedi=new Date(oggi); lunedi.setDate(oggi.getDate()-((oggi.getDay()||7)-1)); lunedi.setHours(0,0,0,0);
  let ore=0;
  cantieri.forEach(c=>(c.giornate||[]).forEach(g=>{const d=new Date(g.data+'T12:00:00');if(d>=lunedi&&d<=oggi)ore+=g.ore*(g.operai||[]).length;}));
  document.getElementById('st-ore').textContent=ore+'h';
  let fat=0,cos=0;
  cantieri.forEach(c=>{
    const tar=parseFloat(c.tariffa)||22;
    let o=0;(c.giornate||[]).forEach(g=>{const d=new Date(g.data+'T12:00:00');if(d.getMonth()===oggi.getMonth()&&d.getFullYear()===oggi.getFullYear())o+=g.ore*(g.operai||[]).length;});
    cos+=o*tar+(c.costiMateriali||[]).reduce((s,m)=>s+(parseFloat(m.importo)||0),0);
    if(parseFloat(c.preventivo)>0)fat+=parseFloat(c.preventivo);
  });
  const m=fat-cos,el=document.getElementById('st-margine');
  el.textContent=(m>=0?'+':'')+new Intl.NumberFormat('it-IT',{minimumFractionDigits:0}).format(Math.round(m))+'€';
  el.className='stat-val '+(m>=0?'pos':'neg');
}

async function syncData(){
  if(!db)return;
  try{
    const [rc,rs]=await Promise.all([
      db.from('dati').select('valore').eq('chiave','cantieri_v1').maybeSingle(),
      db.from('dati').select('valore').eq('chiave','sopralluoghi_v3').maybeSingle()
    ]);
    if(rc.data?.valore?.length>0){const l=getCantieri(),ids=new Set(rc.data.valore.map(x=>x.id)),ex=l.filter(x=>!ids.has(x.id));localStorage.setItem('cantieri_v1',JSON.stringify([...rc.data.valore,...ex]));}
    if(rs.data?.valore?.length>0){const l=getSopralluoghi(),ids=new Set(rs.data.valore.map(x=>x.id)),ex=l.filter(x=>!ids.has(x.id));localStorage.setItem('sopralluoghi_v3',JSON.stringify([...rs.data.valore,...ex]));}
  }catch(e){}
  aggiornaRiepilogo();
}

// ── INIT ──
initDB();
applicaSettings(getSettings());
renderTools();
aggiornaRiepilogo();
setTimeout(()=>syncData().catch(()=>aggiornaRiepilogo()),400);
</script>
</body>
</html>
